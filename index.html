    Whether Social Security is in crisis: recipients rising (~50 million), payers falling; Congress can raise payroll tax or raise benefit age above 65; older people {vote} so there's incentive to fix it; it would be a national {embarrassment} to let it go bankrupt.
    
    {Medicare} is also paid by payroll taxes; probably in more trouble due to same {demographics} and rising medical costs Medicare can only do so much to control; it's a {third party} payer (doesn't provide doctors or medicine); covers more than {45} million Americans.
    
    {AFDC} (Aid to Families with Dependent Children) is what Americans think of as "welfare"—benefits to women with children, amount depending on number of children; {non-contributory} (didn't need to have contributed through taxes); so unpopular we don't have it anymore.
    
    In the 1980s conservatives argued AFDC created {dependency} or incentive not to work; {Bill Clinton} (a Democratic president) pushed welfare reform; the {Personal Responsibility and Opportunity Reconciliation Act} (1996 Welfare Reform Act) got rid of AFDC and replaced it with {TANF} (Temporary Aid to Needy Families)—aid was to be TEMPORARY.
    
    TANF has {work} restrictions and {time} restrictions—two years in a row and five years total; the number receiving welfare did decrease and more found work, but the law didn't reduce {poverty}; during downturns (2001, 2009) caseloads rose again.
    
    Non-contributory programs that remain: {free school lunches}, federal housing assistance, {SNAP} (Supplemental Nutrition Assistance Program / food stamps), and TANF.
    
    One uncontroversial goal is increasing {opportunity}; for most the key is {education}—if everyone is educated they can find good jobs and mitigate risks without government; social policy isn't just redistribution but also education and programs for people who can't help themselves.
    
    # 50 Foreign Policy
    
    Foreign policy is the least and most important—most in impact and number of people affected (especially with environmental policy), least in impact on how Americans think about government and least {democratic}; it includes a lot of {economic} policy.
    
    Foreign policy is the collection of policies that determine America's relations with other nations and foreign entities; it includes: {diplomacy}; military and security policy; international {human rights}; economic policies (trade, international energy); and {environmental} policy.
    
    In some ways foreign policy is the quintessential {public good}—everybody benefits from safety and no individual could pull it off alone; goals: provide {security}; create {prosperity}; and make the world a better place (human rights, peacekeeping, environment).
    
    Security used to mean repelling invaders; now it includes physical security, {transportation}, {energy}, {cybersecurity}, {food} security, and {terrorism}; {George Washington} urged avoiding "foreign entanglements"; the U.S. was largely {isolationist} until World Wars I and II when threats to the international order were seen as detrimental to American security.
    
    After WWII, long-range bombers and {ICBMs} meant a threat to Americans at home; security policy became {deterrence}—building military strength to discourage attack (e.g. Soviet Union); deterrence was expensive (Korea, Vietnam); nowadays {deterrence} is less important; since 2001 a global war on terror including the doctrine of {preemptive} war (e.g. Iraq).
    
    Military force may be the most {visible} form of U.S. foreign policy but not necessarily the most useful; it's generally a {last resort}; downsides include costs in lives and money; Americans support short, decisive, victorious action but the longer a war drags on the {less} support it tends to have.
    
    Economic goals: expand opportunities, promote foreign investment, maintain access to {energy}, promote trade to keep prices low; the U.S. maintains an active role in the {WTO}; we grant "{most favored nation}" status and engage in regional agreements like {NAFTA}.
    
    Making the world a better place: international {human rights} initiatives, peacekeeping (the U.S. doesn't usually commit soldiers to UN peacekeeping, preferring its own coalitions or {NATO}); international {environmental} policy—we lag behind in global environmental initiatives despite being one of the biggest {polluters}; when environmental protection conflicts with economic growth Americans tend to choose {economic growth}.
    
    Overall: security first, economics second, making the world a better place {third} in formal foreign policy.
    
    The {President} is the nation's chief diplomat (receive ambassadors, negotiate treaties); when the Constitution was written most countries were ruled by {kings}, emperors, sultans so we needed one person to negotiate; the president is "the decider" on crucial issues; most day-to-day work is done by {bureaucrats}: {State Department} (diplomatic work), {Defense}, {CIA}, {NSA}, {DHS} (you want as much information as you can before negotiating).
    
    Congress has a {limited} role; the Senate ratifies treaties ({2/3} vote required) so presidents often use {executive agreements} (majority in both houses, easier to secure); Congress has the power of the {purse}—especially {defense} appropriates a lot; contrary to popular belief Congress hasn't budgeted a lot for other foreign policy like aid to foreign nations.
    
    Congressional committees (e.g. foreign relations) provide some expertise but not as much as bureaucracies; Congress can try to limit executive authority through {hearings} (e.g. State Department and Benghazi); it takes a hot-button issue like {Iran}'s nuclear deal for Congress to wade in; for the State Department and president to work with other countries, those countries need confidence deals won't be {undercut} by Congress; fewer actors helps {predictability}.
    
    Interest groups shape the {agenda} but don't craft policies; they're most effective when focused on a {single} issue; {industry} lobbies for trade deals, {labor} often against; {ethnically} based groups (e.g. Irish-Americans in the 1980s) lobby vocally; groups that coalesce around issues have grown with {communication} technologies; {environmental} groups are more effective at demonstrations, {human rights} groups at lobbying; the President is difficult to lobby.

          if (m.index > pos) parts.push({ t: 'text', v: text.slice(pos, m.index) });
          const ans = m[1].trim().split('|')[0].trim();
          parts.push({ t: 'spoiler', v: ans });
          pos = m.index + m[0].length;
        }
        if (pos < text.length) parts.push({ t: 'text', v: text.slice(pos) });
        return parts;
      }

      function createCard(index, item, sectionKey) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.sectionKey = sectionKey;
        if (item.type === 'fill') {
          const q = document.createElement('q');
          q.innerHTML = '<span class="q-num">Q' + index + '.</span> ';
          const parts = renderFillLine(item.text);
          parts.forEach(p => {
            if (p.t === 'text') {
              q.appendChild(document.createTextNode(p.v));
            } else {
              const span = document.createElement('span');
              span.className = 'spoiler';
              span.textContent = p.v;
              span.addEventListener('click', function() {
                this.classList.toggle('revealed');
              });
              q.appendChild(span);
            }
          });
          card.appendChild(q);
        } else {
          const q = document.createElement('q');
          q.innerHTML = '<span class="q-num">Q' + index + '.</span> ' + escapeHtml(item.text);
          card.appendChild(q);
          if (item.answer) {
            const ansBlock = document.createElement('div');
            ansBlock.className = 'answer-block';
            const ansSpan = document.createElement('span');
            ansSpan.className = 'spoiler answer-spoiler';
            ansSpan.textContent = item.answer;
            ansSpan.addEventListener('click', function() { this.classList.toggle('revealed'); });
            ansBlock.innerHTML = '<span class="a-label">A: </span>';
            ansBlock.appendChild(ansSpan);
            card.appendChild(ansBlock);
          }
        }
        card.appendChild(document.createElement('div')).className = 'sep';
        return card;
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      const sections = parseSections(HARDCODED_QUESTIONS);
      const navList = document.getElementById('nav-list');
      const moduleTitle = document.getElementById('module-title');
      const questionsPane = document.getElementById('questions-pane');
      const statsRow = document.getElementById('stats-row');
      const statsLabel = document.getElementById('stats-label');

      sections.forEach((sec, idx) => {
        const key = 's' + idx;
        const btn = document.createElement('button');
        btn.className = 'nav-item';
        btn.textContent = sec.title;
        btn.dataset.sectionKey = key;
        btn.addEventListener('click', () => selectSection(key));
        navList.appendChild(btn);
      });

      function selectSection(key) {
        document.querySelectorAll('.nav-item').forEach(b => {
          b.classList.toggle('active', b.dataset.sectionKey === key);
        });
        const idx = parseInt(key.slice(1), 10);
        const sec = sections[idx];
        if (!sec) return;
        moduleTitle.textContent = sec.title;
        statsRow.style.display = 'flex';
        statsLabel.textContent = sec.questions.length + ' questions';
        questionsPane.innerHTML = '';
        sec.questions.forEach((item, i) => {
          questionsPane.appendChild(createCard(i + 1, item, key));
        });
        document.body.classList.remove('nav-open');
      }

      document.getElementById('btn-modules').addEventListener('click', () => {
        document.body.classList.toggle('nav-open');
      });
      document.getElementById('sidebar-backdrop').addEventListener('click', () => {
        document.body.classList.remove('nav-open');
      });

      document.getElementById('btn-show-all').addEventListener('click', () => {
        questionsPane.querySelectorAll('.spoiler').forEach(el => el.classList.add('revealed'));
      });
      document.getElementById('btn-hide-all').addEventListener('click', () => {
        questionsPane.querySelectorAll('.spoiler').forEach(el => el.classList.remove('revealed'));
      });

      if (sections.length > 0) selectSection('s0');
    })();
  </script>
</body>
</html>
