  <textarea id="questions-data" style="display:none"># 1.0 Intro

What article of the constitution is Congress?
Article 1

How many members are in the House of Representatives?
435

How many members are in the Senate?
100

What article sets up the presidency?
Article 2

# 1.1.1 Enumerated & Implied Powers

Did Alexander Hamilton advocate for a strong national government?
Yes

Loose Construction means that the Constitution allows the government to do whatever is {necessary} and {proper} for the smooth governing of the nation.

Loose Construction is based on what clause.
Elastic/Necessary and Proper Clause

Did Alexander Hamilton believe in Loose Construction?
Yes

Hamilton argued Congress had the power to create a {centralized bank} because of the elastic clause.

The {1819} (what year) {McCulloch v. Maryland} Supreme Court case involved Maryland and the federal government over a national bank.

{James McCulloch} was the agent for the Baltimore branch of the Second National Bank that refused to pay Maryland's tax.

The McCulloch v. Maryland case raised two constitutional questions: Did Congress have the authority to charter a {national bank}? Were states allowed to tax {federal} property?

Who was the Chief Justice in the McCulloch v. Maryland case?
John Marshall

What did the Supreme Court rule? That Congress {could} (could or could not?) create a national bank even though the Constitution did not {expressly authorize} it.

The Supreme Court asserted Congress could establish all means to fulfill Constitutional ends under the {necessary and proper} clause.

The necessary and proper clause is contained in Article {I}, Section {8}.

The McCulloch ruling established the doctrine of {implied powers}.

The {supremacy} clause states that legitimate national laws trump conflicting state laws.

The supremacy clause is contained in Article {6}.

Powers inferred from delegated powers are called {implied powers}.

Powers specifically assigned to the national government are called {delegated powers}.

Powers integral to national sovereignty such as the power to declare war are called {inherent powers}.

Delegated and inherent powers are also called {enumerated powers} because they are explicitly stated in the Constitution.

Article I, Section 3 gives Congress the power to {impeach}.

The {House} has the sole power to make the accusation in impeachment.

The {Senate} has the sole power to try impeachments.

{Two} presidents have been impeached.

The two presidents who were impeached were {Andrew Johnson} and {Bill Clinton}.

Andrew Johnson and Bill Clinton {were not} removed from office.

A {two-thirds} vote is needed in the Senate to remove a president from office.

{Richard Nixon} resigned before facing impeachment.

The most severe form of congressional discipline is {expulsion}.

A {two-thirds} vote is required for expulsion from Congress.

A formal reprimand of a congressman is called {censure}.

A less severe form of congressional discipline than censure is {formal letters of admonishment}.

Congressmen cannot be arrested while Congress is in session except for {treason}, {felony}, or {breach of peace}.

Congressmen {cannot} be arrested for something they said during congressional speeches.

Article I, Section 9 forbids Congress from making an act illegal after it has already been {performed}.

Laws that make an act illegal after it has been performed are called {post facto laws}.

The Latin phrase "{Habeas corpus}" means "you have the body."

Congress can suspend habeas corpus in times of {war} or {insurrection}.

Congress {cannot} create nobility.

Article {I}, Section {8} gives Congress the power to establish post offices and coin money.

Coining money happens at the {US Mint}.

Printing paper money occurs at the {Bureau of Engraving and Printing}.


# 1.1.2 Power to Tax

The power of the purse is important. Article {1}, Section {7} gives Congress the power to raise revenue so the government can function.

Taxing and spending bills must begin in the {House}; the Senate can propose and concur on them.

The government gets about {80}% of its revenue via taxation.

Article 1, Section 8 requires Congress to collect taxes and import duties, or {tariffs}.

A tax where the more you earn the higher your rate is called a {progressive} tax; the poor and working poor often do not pay the federal {income} tax.

Workers pay a {payroll} tax (Social Security and Medicare) matched by the employer; these are {flat} taxes.

Because payroll taxes are not levied on investments and the wealthy invest more, lower income people may pay more into Social Security—this is called a {regressive} tax.

A tax on items like alcohol and cigarettes is a {sin} tax; a tax on property after death is the {estate} or {death} tax.

The government body that helps Congress collect taxes is the {IRS} (Internal Revenue Service); tax day is {April 15}.

If the US spends more in a year than it makes, it has a {deficit}; the {public debt} is the sum of the nation's deficits.

The sale of {bonds} helps the government manage its deficit; {Liberty} bonds helped finance both world wars.

Since the {1921} (what year?) Budget and Accounting Act, the president has submitted a budget to Congress for each fiscal year.

The fiscal year runs from {October 1} to {September 30}.

The use of taxes and expenditures to shape the economy is {fiscal} policy.

The Bureau of the Budget is now called the {Office of Management and Budget} (OMB).

The budget includes {budget authority} (amount agencies may spend), {budget outlay} (amount expected to be spent), and {receipts} (expected revenue).

The {Congressional Budget Office} helps Congress manage the budget process.

The {Gramm-Rudman} Act of 1984 required Congress to pay down the national debt each year with the goal of being debt-free by 1991; it {failed}.

The Budget Enforcement Act (BEA) of 1990 defined {mandatory} spending (e.g. entitlements like Social Security) and {discretionary} spending.

The BEA created a pay-as-you-go system: increases in entitlements had to be offset by taxes or cuts in {discretionary} spending.

The {Balanced Budget} Act of 1997 led to a surplus; it expired in {2002}.

Article 1, Section 8 gives Congress the power to {borrow} money for national purposes and to pay the nation's debt.

Article 1, Section 8 also gives Congress the right to establish uniform rules on {bankruptcies}, raise an army and maintain a navy, declare {war}, and grant {copyrights}, {trademarks}, and {patents}.

Congress has the right to govern {Washington D.C.}; the area is sometimes called inside the {beltway}.

Since {1971} D.C. has had a Congressional delegate who can vote in committees but not on final passage on the floor.

The {23rd} Amendment gave D.C. residents the right to vote for president.


# 1.1.3 Org, Rules & Committees

The House has a {proportional} number of members from each state based on population, thanks to the {Great Compromise} (Connecticut Compromise).

The House consists of {435} members total; Alaska has one, California has {52}.

The {Speaker of the House} is second in line for the presidency and is selected by the {majority} party.

The Speaker is the principal leader of the majority party and the {presiding} officer of the entire House.

The majority party also elects a {majority leader} and a {whip}; the whip keeps the leader informed and rounds up members for votes.

The whip determines the {likely vote} on controversial issues; the majority whip has {deputy} whips.

The minority party selects a {minority leader} and {minority whip}.

The Senate has {two} Senators per state—a Senior and Junior Senator ranked by {years in office}.

There are {100} Senators; with the House, Congress has {535} members total.

The {Vice President} is President of the Senate; in practice his main function is to cast the {tie-breaking} vote.

The leadership of the Senate is the {president pro tempore} (pro tem), Latin for "of the {time}."

The president pro tem is {third} in line for presidential succession and is usually the longest-serving member of the majority party.

Congress gets its work done primarily through {committees}; permanent committees assist with legislative duties.

A {select} committee is formed for a temporary matter and is disbanded when the issue is resolved; also called {ad hoc} committees.

The {Steering} Committee in each chamber decides which members serve on which committees.

Congress uses a {seniority} system so the longest-serving members often head committees; in the 1970s a {secret ballot} was introduced in the House for leadership.

The highest-ranking minority member on a committee is the {ranking committee} member.

The most powerful House committee is {Ways and Means} because it appropriates federal funding.

Along with Ways and Means, the {Senate Committee on Finance} and the {Joint Committee on Taxation} can request to review tax documents in closed session.

The House {Rules} Committee limits time for debate and determines whether amendments can be considered; the Senate has {no} Rules Committee.

Both chambers have {Appropriations} Committees to allocate spending, plus Armed Services, Judiciary, and Veteran's Affairs.

Each chamber has about {20} standing committees; about {42} members serve on each House committee and about {8} on each Senate committee.

Staff includes legislators' {personal} staff (DC and home districts), {committee} staffers, and staff agencies.

Staff agencies include the {Congressional Research Service}, the {General Accounting Office}, and the {Congressional Budget Office}.

All records of congressional business are in the {Congressional Record}, which includes a {Daily Digest}, House section, Senate section, and extended remarks.


# 1.2 The President

The President's powers have {increased} over the course of American history.

The Vice President is written into the Constitution in Article {II} with the President.

The First Lady is {not} written into the Constitution but is an integral part of the President's team.


# 1.2.1 President & His Powers

The presidency is in Article {Two} of the Constitution; the framers thought {Congress} (Article One) was the more important branch.

The President must be a citizen, at least {35} years of age, and take the oath of office as prescribed in the Constitution.

In Britain the {monarch} is head of state and the {Prime Minister} is chief executive; in the US the President holds {both} roles.

The {12th} Amendment (1804) ensured the President and Vice President are of the same party (originally the VP was whoever got second-most Electoral College votes).

Article II Section 2 states the President is {commander in chief} of the armed forces and can grant {pardons} except in cases of impeachment.

The President can receive foreign ambassadors, {recognize} foreign governments, and negotiate {treaties} with the advice and consent of the {Senate}.

Treaties need {two-thirds} Senate support; Washington set the precedent that only the Senate's consent was needed.

Woodrow Wilson's {League of Nations} treaty failed to get Senate ratification; Clinton's 1999 Comprehensive Nuclear Test Ban Treaty also failed.

Presidents can make {executive agreements} with foreign powers and issue {executive orders} that have the force of law unless courts overturn them.

Executive Order 9022 relocated Japanese Americans to internment camps; the Supreme Court upheld it in {Korematsu v. United States} (1944).

President Truman {desegregated} the military by executive order.

Presidents can {veto} acts of Congress and invoke {executive privilege} (withholding information from Congress, judiciary, or public).

{Signing statements} express how the President intends to execute a bill; George W. Bush used them about {800} times.

The President appoints the {cabinet}; members preside over federal agencies. Variety of expertise is meant to discourage {groupthink}.

The head of OMB and the US Ambassador to the UN are {cabinet} members. The {Executive Office of the President} helps discharge the President's duties; staff work in the West Wing or Old Executive Office Building.

The President appoints ambassadors and federal {judges}; cabinet members, ambassadors, and judges require Senate {confirmation}.

Article II Section 4: the President must take care that the laws be {faithfully executed} and can be removed only for {treason}, {bribery}, or other high crimes and misdemeanors.

The President serves a term of {four} years. Washington set the precedent of {two} terms; FDR broke it by winning a third and fourth term in {1940} and {1944}.

The {22nd} Amendment (1951) limited the President to two terms; it did not apply to the President in office at ratification ({Truman}).

Truman succeeded FDR when FDR died of a cerebral hemorrhage on April 12, {1945}; Truman fired General {MacArthur} during the Korean War.


# 1.2.2 VP & First Lady

The {Vice President} is in the Constitution; the {First Lady} is not.

The {12th} Amendment changed how the VP was chosen; the VP serves as President of the Senate and casts the {tie-breaking} vote.

Vice President {Mike Pence} cast tie-breaking votes on Trump's nomination of Betty DeVos to Education Secretary.

Vice President Harry Truman was not informed of the {Manhattan} project; he learned of the atomic bomb after succeeding FDR in April {1945}.

President Kennedy's assassination on November 22, {1963} led to the ratification of the {25th} Amendment (1967).

The 25th Amendment provides for presidential {succession} and {inability}; it has {four} sections.

Section 1: upon death, removal, impeachment, or resignation, the {Vice President} becomes President.

Section 2: if the vice presidency is vacated, the President must appoint a new VP with approval of {Congress}. Nixon's VP {Spiro Agnew} resigned; Nixon nominated {Gerald Ford}, who was confirmed. Then Nixon resigned over {Watergate}.

Section 3: if the President determines he is unable to serve, he notifies the President pro tem and Speaker in {writing}; the VP acts as President until inability ends.

Section 4: if the President cannot inform them in writing, the VP and majority of the {Cabinet} can do so; the VP then acts as President. Congress decides if there is disagreement. The 25th is the {longest} and most complex amendment.

Eleanor Roosevelt was chosen ambassador to the UN by President {Truman}. Jackie Kennedy refurbished the White House and accompanied JFK to France; the Social Office of the First Lady is in the {East} Wing.

{Nancy Reagan} launched the Just Say No campaign. {Hillary Clinton} took on healthcare; universal healthcare was defeated by insurance lobbyists in the 1990s.

{Laura Bush} worked on childhood literacy. {Michelle Obama} championed women's rights and planted a Victory Garden at the White House.


# 1.3 The Bureaucracy

The Bureaucracy is {not} written into the Constitution.

It has grown over the 20th century and is designed by {Congress} to help with duties and powers; the {President} also increases its size.

The bodies of the bureaucracy include private corporations, agencies, and specific {regulatory} agencies.


# 1.3.1 Bureaucracy Origins

The bureaucracy is not in the Constitution nor one of the {three} branches; Congress creates agencies by {legislation}.

Agencies have the power of {administrative discretion}—the way they interpret the law sets policy. Implementing laws Congress enacts is the bureaucracy's main purpose.

When {Andrew Jackson} became president in 1828, he awarded jobs to supporters by the thousands based on {patronage}—to the victor go the spoils.

The {Pendleton Civil Service} Act of {1883} made some jobs off limits to patronage and made it illegal to fire civil servants for purely political reasons; it established the Civil Service {Commission}.

Most federal jobs are now {civil service} positions based on {merit}, not patronage. Hiring involves a Civil Service Exam or interviews on education, background, and {KSAs} (knowledge, skills, and abilities).

The {Hatch} Act (Political Activities Act of 1939) ensures civil servants do not work on political campaigns or use their position to influence elections.

The federal government is the single {largest} employer in the United States.

A {general schedule} (pay schedule) has 15 levels with 10 steps to ensure uniformity in pay. The bureaucracy is staffed by {professionals} who make a career of their position.

{Public} demand for social services, especially after the {Great Depression}, best explains the growth of the federal bureaucracy over the past 100 years.

FDR created the Office of War Information by executive order in {1942}; it was disbanded in {1945}. The {Cold War} military establishment was a main reason for bureaucracy expansion; by the 1950s four-fifths of the budget went to defense.

Reagan ran on reducing government but {increased} the size of the Department of Defense.

Examples of bureaucratic functions: {Selective Service} tracks military eligibility; {National Archives and Records Administration} houses documents; {US Postal Service} delivers the mail.


# 1.3.2 Bureaucracy Bodies

People often argue for {privatization}, {deregulation}, or {devolution} to reduce bureaucracy. Privatization turns functions over to the {private} sector; devolution transfers federal functions to the {states}.

The federal bureaucracy includes {cabinets}, independent executive agencies, {regulatory} agencies, and government corporations.

The President chooses the cabinet. Washington had {four} cabinet members; today there are 15 federal departments plus the UN Ambassador and OMB head.

Department heads are called {Secretaries} except the head of the Department of Justice, who is the {Attorney General}.

The Department of {State} and Department of {Treasury} were created in 1789; the Department of {Homeland Security} was created in {2002} in response to 9/11.

{Independent executive agencies} report to the President with appointed heads but have more focused tasks and are not under a specific department. Examples: {Federal Reserve}, {EPA} (Environmental Protection Agency).

Agencies have mission goals and {survival} goals; they form alliances with interest groups and Congress. The {Iron Triangle} is the three-way relationship between congressional committees, interest groups, and the bureaucracy.

The {revolving door} refers to lobbyists who are former employees of the agency they lobby.

{Regulatory} agencies emerged in the late 1800s to control industrialization. Examples: {SEC} (Securities and Exchange Commission), {ICC} (Interstate Commerce Commission—railroads).

Government corporations: the government formed {AMTRAK} to manage railroads. Unlike private corporations, profits of government corporations go toward {perpetuating} the corporation, not dividends.


# 1.4 How a Bill Becomes a Law

In the House, members introduce bills by dropping them in the {hopper} (a box by the Speaker's seat); in the Senate they hand bills to a clerk or introduce on the floor. At any step a bill can {die}.

Bills are referred to {committee}, which often sends them to {subcommittees} to study, hold hearings, and make recommendations.

The bill goes back to the full committee, which may accept subcommittee recommendations or hold its own hearings. The bill then reaches the {markup} stage where a final version is written. The bill can die in committee or be {reported to the floor}.

In the House, the bill goes to the {Rules} Committee, which decides the length of debate and whether amendments may be proposed from the floor.

A {closed} rule severely limits amendments; an {open} rule permits amendments on the floor. The Senate has no Rules Committee and allows {unlimited} debate.

A {filibuster} is when a Senator hijacks the floor by speaking at length to prevent the Senate from acting on a bill; it weakens party leadership. The word comes from French for {pirate}.

Senator {Strom Thurmond} filibustered for 24 hours on the 1964 Civil Rights Act. He had run in 1948 on the {Dixiecrat} ticket.

To end a filibuster the Senate votes for {cloture}. Senate Rule #{22} (cloture) requires {3/5} (60 Senators) to limit debate; then Senators get an hour each and total debate is capped at {30} hours.

After the floor vote, differences between House and Senate versions are resolved in {Conference} Committee, made up of delegations from the original House and Senate committees.

After Conference Committee, the bill must be approved by both {House} and {Senate}. Members often engage in {log rolling} or vote trading (quid pro quo)—you scratch my back, I'll scratch yours—reflecting {reciprocity}.

The President must {sign} the bill for it to become law; veto power is discussed in Module 5.3.


# 1.5.1 Institutions & Media

Article II Section 3 gives the President power to call Congress into {special session} or adjourn Congress, and to give Congress information on the State of the Union. The {State of the Union} address is given each January.

Congress has delegated powers to the President particularly during {wartime}. LBJ inherited the Vietnam conflict from Kennedy; Kennedy had sent advisers (e.g. {Green Berets}) without a declaration of war.

The {1964} Gulf of Tonkin Resolution gave Johnson a "blank check" to expand US involvement in Vietnam; it was based on a likely {manufactured} incident. It authorized "all necessary measures" to repel attack and prevent aggression.

Congress also gave the President {fast-track} authority to negotiate foreign trade agreements—Congress can only approve or disapprove, not amend.

The President has a {chief of staff}, {national security adviser}, {Council of Economic Advisers}, and offices like the White House Office of {Legislative Affairs}. He has speechwriters and a {press secretary}.

The media is called the fourth branch because of its role in {agenda-setting}—defining the importance of events and issues. The Constitution {does not} mention the media.

The {bully pulpit} is the platform from which the President can push his agenda to the public; the term was coined by President {Theodore Roosevelt}.

Wilson's whistle-stop tour for the {League of Nations} failed; Senate {isolationists} did not ratify. FDR used {fireside chats} on the {radio} to win support for the New Deal.

{JFK} was the first president to use television to his advantage; it helped him beat Nixon in {1960}—radio listeners thought Nixon won, TV viewers thought Kennedy won.

Until the 1990s the President got more press than Congress; then Speaker {Newt Gingrich} appeared more than Clinton for a time. {Obama} was the first social media candidate (2008); {Trump} used Twitter to appeal directly to the public.


# 1.5.2 Role & Types of Media

Mass media includes {broadcast} media (radio, television, internet) and {print} media (magazines, journals, newspapers). {Weblogs} or vlogs let anyone be a news journalist.

Those under 35 tend to get news from the {internet} and social media; those over 50 from {television}. {Attentive policy elites} are those who follow political news closely.

People seek media that {reinforce} their existing views. Conservative-leaning examples: {Fox News}, National Review, Forbes. Liberal-leaning: {MSNBC}, The Daily Beast, Politico.

{Pundits} or {talking heads} provide commentary; about {3/4} of Americans claim to get news from TV. TV viewers are often not well-informed because TV is {for-profit} and centers on {infotainment}.

Stories are chosen by {newsworthiness} and ability to generate interest—{market-driven} journalism. "If it bleeds, it {leads}"—violence gets viewers. TV depends on {advertisements}.

Candidates create {media events} and use {sound bites} and {talking points} for free exposure. {Public relations} is paid communication to improve an image; it is not neutral like journalism. PR appears as {press releases} or paid ads.

The {FCC} (Federal Communications Commission) regulates the media; the government treats the airways as {public}. Certain content is not allowed on public airwaves that is allowed on {cable}.

The media informs the public and holds government {accountable}. The {Freedom of Information} Act (1966), or FOIA, lets the public request government documents. The government must release information unless it meets one of {nine} exemptions (e.g. national security, personnel rights, trade secrets).


# 2.1 Judicial System

{Judicial implementation} is the process by which court decisions are carried out or limited by other actors; it is a major check on the Supreme Court.

The {Supreme Court Chief} Justice sets judicial policy and presides over the federal court system.


# 2.1.1 Supreme Court

Article Three, Section One states that federal judges hold their offices during {good behavior}.

The framers believed life tenure would protect {judicial independence}.

The Judiciary Act of {1789} established a {six} justice Supreme Court, {13} district courts, and {three} Circuit Courts.

Congress reduced Supreme Court justices from six to five in the Judiciary Act of {1801}; since {1869}, {nine} justices have sat on the Court.

The case that established the principle of judicial review was {Marbury v. Madison} (1803).

The Chief Justice who established judicial review was {John Marshall}.

In Marbury v. Madison, {William Marbury} had been nominated Justice of the Peace by John Adams in a midnight appointment.

{James Madison} (Jefferson's Secretary of State) refused to finish processing the commissions.

Marshall ruled Congress had exceeded its {constitutional authority} in writing the Judiciary Act of 1789.

In {Fletcher v. Peck} (1810), Marshall stated that states could not impair the {obligation of contracts} between governments and individuals.

Dartmouth College v. Woodward (1819) concerned {New Hampshire's} attempt to transform Dartmouth College (a private corporation) into a state university.

Marshall ruled in Dartmouth that a state charter was a {contract} protected from state interference.

FDR's 1937 court-packing plan called for adding a new justice whenever an incumbent refused to retire at age {70}, which could have expanded the Court to {15}.

FDR wanted to pack the Court because he feared it would continue to overturn his {New Deal} programs.

The two New Deal agencies the Supreme Court had already overturned were the {National Recovery Administration} and the {Agricultural Adjustment Administration}.

The party bringing a case to court is the {plaintiff}; those defending are {defendants}.

Under {original} jurisdiction a case is heard for the first time; under {appellate} jurisdiction a court hears a case on appeal.

The rule of four means at least {four} of the nine justices must agree to issue a writ of certiorari for the Supreme Court to hear a case.

A {writ of certiorari} calls for a lower court to send case records to the Supreme Court.

The {Solicitor General} (presidential appointee in the Justice Department) urges the court to take cases on the government's behalf.

The three main types of opinions the Court may issue are {majority}, {concurring}, and {dissenting} opinions.

Judges who interpret the Constitution narrowly and adhere strictly to the text are {strict constructionists}; {loose} or broad constructionists view it through evolving moral and cultural standards.

{Thomas Jefferson} was a strict constructionist who nonetheless made the Louisiana Purchase.


# 2.1.2 Judicial Implementation

The {executive} branch enforces the law, not the judicial branch.

The courts {cannot} enforce their own rulings.

The most significant check on the Supreme Court is {judicial implementation}.

Lower courts can limit the impact of a Supreme Court ruling by suggesting the {precedent} does not apply to the case they are deciding.

The {Chief Justice of the Supreme Court} presides over the federal court system and the Judicial Conference of the United States.

Through the {Judicial Conference}, the Chief Justice sets the federal court system's priorities.

Article Three, Section Two says the President appoints Supreme Court Justices with the {Senate's} consent; this has been extended to all federal judges.

The White House often gets recommendations for judicial nominees from the {American Bar Association} or the {Federalist Society}.

When nominees testify, the Senate Judiciary Committee fulfills its role of {advice and consent}.

About {20}% of nominees are not acted on by the Senate.

{Senatorial courtesy} is when senators from the nominee's home state can effectively veto the nominee by voting against them.

If a party loses a federal civil lawsuit and appeals, the appeal goes to the United States {Court of Appeals} (also called {appellate} court or U.S. {Circuit} Court of Appeals).

There are {13} federal appellate courts in the U.S.

Appellate courts do {not} usually consider new evidence; they determine whether the district court made an error or its decision was unwarranted.

An {amicus curiae} brief is a "friend of the court" brief; interest groups submit them to present arguments and cite precedents.

FISA stands for the {Foreign Intelligence Surveillance} Act.

The FISA court was established in {1978} and granted the federal government power to place surveillance on suspected spies or enemies.

The FISA court operates in complete {secrecy}; it does not publish its findings.

The {Ninth} Circuit's decisions are overturned most often by the Supreme Court.


# 2.2 Civil Rights & Liberties

Civil rights are guarantees that the federal government will treat people {equally} and base decisions on {merit} rather than race, gender, religion, or other personal characteristics.

Civil rights are sometimes called {positive} rights because they are powers and privileges granted by the Constitution.

The {NAACP} found the Supreme Court a powerful tool for advancing civil rights in the 1950s and 60s.

{Brown v. Board of Education of Topeka, Kansas} (1954 and 1955) overturned Plessy v. Ferguson and ended "separate but equal."

Plessy v. Ferguson (1896) had upheld {segregation} by allowing separate but equal accommodations.

The liberal Warren Court was named after Chief Justice {Earl Warren}.

In Engel v. Vitale (1962), the Supreme Court ruled that {Bible reading} in public schools was unconstitutional.

Baker v. Carr (1962) and Reynolds v. Sims (1964) enshrined the {one person, one vote} rule.

Civil liberties are {freedoms} guaranteed in the Constitution; sometimes called negative rights because they limit the power of government.

In {Griswold v. Connecticut} (1965), the Court protected the right to {privacy} by striking down a law banning the sale of contraceptives.

The Court cited the {First}, {Fifth}, and {Ninth} Amendments for the right to privacy in Griswold.

In Bowers v. Hardwick (1986) the Court ruled against a right to engage in homosexual acts; it overruled that in {Lawrence v. Texas} (2003).

{Obergefell v. Hodges} (2015) made same-sex marriage legal throughout the United States.

Roe v. Wade (1973) established that the right to privacy includes the right to {abortion}; the Court used a {trimester} framework.

In the first trimester a woman could seek an {abortion}; in the last two trimesters the state could regulate based on {health} reasons.

{Judicial activism} means attempts by judges to influence public policy through their case decisions.

{Judicial restraint} is the view that the Supreme Court should decide only narrow constitutional issues and not usurp other branches' powers.

Executive Order {9066} authorized sending Americans of Japanese descent to internment camps during World War II.

In {Korematsu v. United States}, the Court declared the Japanese evacuation {constitutional}.

Congress passed the Patriot Act after the terrorist attacks of September {11}, {2001}.

The Patriot Act expanded the government's abilities to put Americans under {surveillance} and to monitor {internet} and {phone} communications.

The Patriot Act allowed the federal government to find out what books people checked out from the {library} and what {videos} they watched (previously required a court order).


# 2.3 Bill of Rights

{James Madison} streamlined more than 200 demands from state ratifying conventions into the Bill of Rights.

Madison originally proposed {12} amendments; {10} were ratified as the Bill of Rights.

The Bill of Rights was based in part on the English Bill of Rights, signed by King {William III} in the late {1680s}.

George Mason drafted the {Virginia Declaration of Rights} in 1776, which influenced the Bill of Rights.

Mason and other Anti-Federalists agreed to support the Constitution only if the final version included a {Bill of Rights}.

The First Amendment protects freedoms of {religion}, {speech}, {press}, and political activity (assemble and petition the government).

The Second Amendment guarantees the right to {keep and bear arms}.

The Third Amendment sought to protect citizens from {standing armies} (quartering of soldiers).

Amendments {Four} through {Eight} limited police powers by guaranteeing fair treatment in legal and judicial proceedings.

The Fourth Amendment protects the right to be secure from {unreasonable search and seizure}.

The Fifth Amendment includes due process, indictment by {grand jury} for capital crimes, and the right not to {testify against oneself}.

The Sixth Amendment guarantees rights to a {speedy} trial by an {impartial} jury.

The Seventh Amendment guarantees the right to a {jury} trial in {civil} cases.

The Eighth Amendment protects against excessive {bail}, excessive {fines}, and {cruel and unusual} punishment.

The Ninth Amendment reserves to the {people} rights not enumerated in the Constitution; the Tenth reserves to the {states} powers not delegated to the federal government.

To amend the Constitution requires a {2/3} vote of both houses of Congress and ratification by {3/4} of the states (state legislators or state ratifying conventions).


# 2.4 Incorporation

The Establishment Clause prohibits {Congress} from establishing an official religion.

In Great Britain, the {Queen} is the head of the Church of England (Anglican church since Henry VIII split with the Catholic church).

The Free Exercise Clause ensures freedom of individuals to {practice their religion}.

The Lemon test (Lemon v. Kurtzman, 1971) says the program must have no {religious purpose} and must not promote or inhibit any religion.

In Lynch v. Donnelly (1984), the Court decided that a {manger} and {Santa Claus} display on public property was constitutional as a national holiday celebration.

Zelman v. Simmons-Harris (2002) allowed parents to use publicly funded {school vouchers} to pay tuition at religious schools.

Under strict scrutiny, a law that discriminates against a religious practice must have a {compelling government interest} and be as {unrestrictive} as possible.

Freedom of expression under the First Amendment is {not} absolute; people cannot openly discuss assassination of a president or treasonous activities.

Schenck v. United States (1919) established the {clear and present danger} test.

In Schenck, the Court upheld the conviction of a defendant who had given out {anti-draft} literature during wartime.

The Sedition Act of 1798 made it a crime to {speak out against the government}; it was intended to suppress the Jefferson Republicans.

By the mid-20th century, the Court upheld {symbolic} expression, including students wearing armbands to protest the Vietnam War (1969).

In Brandenburg v. Ohio (1969), the Court struck down the conviction of a {Ku Klux Klansman} who had made threatening statements.

In Cohen v. California (1971) the Court said "one man's vulgarity is another man's lyric" and allowed a shirt with a vulgar {anti-war} slogan.

{Libel} is defamation of a person in writing; {slander} is oral false statements intended to damage.

In New York Times v. Sullivan (1974), false statements against officials were protected unless the plaintiff could prove {malice}.

When the right to a fair trial conflicts with freedom of the press, a judge may issue a {gag order}.

The 2008 Supreme Court ruling (District of Columbia v. Heller) deemed the banning of {handguns} in Washington D.C. unconstitutional.

The {National Rifle Association} (NRA) is against most gun restrictions.

The Third Amendment prohibits {quartering} soldiers in homes in peacetime without consent; in wartime only as prescribed by law.

Some say the Third Amendment is obsolete because it is unlikely the government will need to quarter troops as the {British} did before the Revolution.

The Third Amendment serves as a reminder that Americans have a right to {privacy} and that homes shall not be violated without significant reason.


# 2.5 Equal Protection & Due Process

Under the Fourth Amendment, law enforcement must have {probable cause} to obtain a search warrant.

The Takings Clause of the Fifth Amendment says private property cannot be taken for public use without {just compensation}.

{Eminent domain} is the government's right to take property for public use (traditionally for transportation like railroads and highways).

The Federal Highway Act of {1956} authorized interstate highways and bulldozed entire neighborhoods—first time one could drive NYC to San Francisco without a traffic light.

The exclusionary rule (Mapp v. Ohio, 1961) says evidence gathered {illegally} cannot be used in court against a defendant; it is drawn from the {Fourth} Amendment.

The good-faith exception (1984) says if a warrant was given in {good faith} even based on faulty evidence, the evidence could still be used—to protect against corrupt policing.

In Gideon v. Wainwright (1963), the Court ruled that a person who could not afford an attorney had the right to {counsel} at {public} expense.

Escobedo v. Illinois (1964) voided {murder confessions} of a man who had been denied the right to see an attorney.

{Miranda v. Arizona} (1966) established Miranda rights.

Key Miranda rights include the right to {remain silent} and the right to an {attorney}; if you cannot afford one, one will be provided.

{Due process} is protection from imprisonment without a trial; outlined in the Fifth Amendment.

The Fifth Amendment protects against {double jeopardy}—no one acquitted of a crime can be prosecuted again for that same crime.

The Sixth Amendment outlines rights in a {criminal} trial, including the right to {witnesses}; the Seventh covers {civil} trials (e.g., individual vs. business).

The Eighth Amendment prohibits excessive {bail}, excessive {fines}, and {cruel and unusual} punishment.

The Fourteenth Amendment was ratified in {1868}; it guaranteed that no state may deny life, liberty, or property without {due process} of law nor deny {equal protection} of the laws.

Due process is mentioned in both the {Fifth} and {Fourteenth} Amendments.

The Ninth Amendment states that the enumeration of certain rights shall not be construed to deny or disparage others retained by the {people}.

The Tenth Amendment states that powers not delegated to the United States nor prohibited to the states are reserved to the {states} or to the {people}.

The Tenth Amendment does {not} meaningfully limit federal power; it largely re-states what is evident elsewhere.

  <script>
    (function() {
      const HARDCODED_QUESTIONS = document.getElementById('questions-data').value.trim();

      function parseSections(text) {
        const sections = [];
        const lines = text.split(/\r?\n/);
        let currentSection = null;
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const headerMatch = line.match(/^#\s+(.+)$/);
          if (headerMatch) {
            const title = headerMatch[1].trim();
            if (currentSection && (currentSection.questions.length > 0 || currentSection.title !== 'Crash Course Government & Politics — All Questions')) {
              sections.push(currentSection);
            }
            currentSection = { title, questions: [] };
            continue;
          }
          const trimmed = line.trim();
          if (!trimmed || !currentSection) continue;
          if (currentSection.title === 'Crash Course Government & Politics — All Questions') continue;
          if (trimmed.indexOf('{') !== -1 && trimmed.indexOf('}') !== -1) {
            currentSection.questions.push({ type: 'fill', text: trimmed });
          } else if (trimmed) {
            const nextLine = (lines[i + 1] || '').trim();
            const hasAnswer = nextLine && !nextLine.startsWith('#');
            currentSection.questions.push({ type: 'qna', text: trimmed, answer: hasAnswer ? nextLine : '' });
            if (hasAnswer) i++;
          }
        }
        if (currentSection && currentSection.questions.length > 0) sections.push(currentSection);
        return sections;
      }

      function renderFillLine(text) {
        const parts = [];
        let pos = 0;
        const re = /\{([^}]+)\}/g;
        let m;
        while ((m = re.exec(text)) !== null) {
          if (m.index > pos) parts.push({ t: 'text', v: text.slice(pos, m.index) });
          const ans = m[1].trim().split('|')[0].trim();
          parts.push({ t: 'spoiler', v: ans });
          pos = m.index + m[0].length;
        }
        if (pos < text.length) parts.push({ t: 'text', v: text.slice(pos) });
        return parts;
      }

      function createCard(index, item, sectionKey) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.sectionKey = sectionKey;
        if (item.type === 'fill') {
          const q = document.createElement('q');
          q.innerHTML = '<span class="q-num">Q' + index + '.</span> ';
          const parts = renderFillLine(item.text);
          parts.forEach(p => {
            if (p.t === 'text') {
              q.appendChild(document.createTextNode(p.v));
            } else {
              const span = document.createElement('span');
              span.className = 'spoiler';
              span.textContent = p.v;
              span.addEventListener('click', function() {
                this.classList.toggle('revealed');
              });
              q.appendChild(span);
            }
          });
          card.appendChild(q);
        } else {
          const q = document.createElement('q');
          q.innerHTML = '<span class="q-num">Q' + index + '.</span> ' + escapeHtml(item.text);
          card.appendChild(q);
          if (item.answer) {
            const ansBlock = document.createElement('div');
            ansBlock.className = 'answer-block';
            const ansSpan = document.createElement('span');
            ansSpan.className = 'spoiler answer-spoiler';
            ansSpan.textContent = item.answer;
            ansSpan.addEventListener('click', function() { this.classList.toggle('revealed'); });
            ansBlock.innerHTML = '<span class="a-label">A: </span>';
            ansBlock.appendChild(ansSpan);
            card.appendChild(ansBlock);
          }
        }
        card.appendChild(document.createElement('div')).className = 'sep';
        return card;
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      const sections = parseSections(HARDCODED_QUESTIONS);
      const navList = document.getElementById('nav-list');
      const moduleTitle = document.getElementById('module-title');
      const questionsPane = document.getElementById('questions-pane');
      const statsRow = document.getElementById('stats-row');
      const statsLabel = document.getElementById('stats-label');

      sections.forEach((sec, idx) => {
        const key = 's' + idx;
        const btn = document.createElement('button');
        btn.className = 'nav-item';
        btn.textContent = sec.title;
        btn.dataset.sectionKey = key;
        btn.addEventListener('click', () => selectSection(key));
        navList.appendChild(btn);
      });

      function selectSection(key) {
        document.querySelectorAll('.nav-item').forEach(b => {
          b.classList.toggle('active', b.dataset.sectionKey === key);
        });
        const idx = parseInt(key.slice(1), 10);
        const sec = sections[idx];
        if (!sec) return;
        moduleTitle.textContent = sec.title;
        statsRow.style.display = 'flex';
        statsLabel.textContent = sec.questions.length + ' questions';
        questionsPane.innerHTML = '';
        sec.questions.forEach((item, i) => {
          questionsPane.appendChild(createCard(i + 1, item, key));
        });
        document.body.classList.remove('nav-open');
      }

      document.getElementById('btn-modules').addEventListener('click', () => {
        document.body.classList.toggle('nav-open');
      });
      document.getElementById('sidebar-backdrop').addEventListener('click', () => {
        document.body.classList.remove('nav-open');
      });

      document.getElementById('btn-show-all').addEventListener('click', () => {
        questionsPane.querySelectorAll('.spoiler').forEach(el => el.classList.add('revealed'));
      });
      document.getElementById('btn-hide-all').addEventListener('click', () => {
        questionsPane.querySelectorAll('.spoiler').forEach(el => el.classList.remove('revealed'));
      });

      if (sections.length > 0) selectSection('s0');
    })();
  </script>
</body>
</html>
