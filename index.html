African Americans and Jewish people tend to be among the most {liberal}; white Catholics tend to be {conservative}.

{Latinos} are an interesting case: many are Catholic but tend to be more liberal politically.

{Education} and {income} also influence ideology; the more education, the more likely to be liberal (with exceptions).

# 36 Election Basics

We choose {representatives} rather than holding referendums on every issue because America is too big and complex.

{Adverse selection} is the problem of making a choice without all the information needed; elections help by being {competitive}.

Elections make candidates {accountable} by giving voters a chance to remove bad actors.

Most rules for how elections are carried out come from {state} laws, legal decisions, and local practices, not the Constitution.

Article I, Section 4 says the {times}, {places}, and {manner} of holding elections for Senators and Representatives are prescribed by each state.

The {17th} Amendment allowed direct election of Senators.

The {12th} Amendment fixed the electoral process so the President and Vice President come from the same party.

The {24th} Amendment outlawed poll taxes; the {26th} Amendment lowered the voting age to eighteen.

The {Voting Rights Act of 1965} set up systems to increase voter participation by minority groups.

In most states we follow the {plurality} rule: the candidate with the {most} votes wins, not necessarily a majority.

When no candidate gets 50% plus one, some states use a {runoff} election between the top two.

{Winner take all} applies to 48 of 50 states for electoral votes: the winner gets 100% of the state's electoral votes.

The federal government tends to {expand} voting; states often {restrict} it through registration and felony disenfranchisement.

# 37 Gerrymandering

{Congressional apportionment} is how many representatives each state gets; it is based on {population} and changes every 10 years with the {census}.

California has the most representatives ({53}); the least populous states have only {one}.

{At large} elections mean the whole state (or area) chooses one or more representatives; used for Senators and the Electoral College.

{Single member districts} mean each district chooses one representative.

The idea that districts must have equal population is {one person, one vote}, from {Baker v. Carr} (1962).

{Majority-minority} districts are districts where the majority of voters are members of a minority group.

{Gerrymandering} is drawing district boundaries to favor one party; named after {Elbridge Gerry} and a district that looked like a reptile.

Districts must be roughly equal in population and {contiguous} (not divided by other districts).

District lines are drawn by {state legislatures} (or those working at their behest).

Whoever controls the state legislature in {census} years gets to redraw the districts.

In the Senate, {Delaware} has 2 senators for under 1 million people; {California} has 2 senators for about 38 million—so one person one vote does not apply to the Senate.

Gerrymandering can make a 60% Republican state end up with 5 Republican districts and 0 Democratic ones.

# 38 How Voters Decide

The three main factors that influence how a person votes are {party loyalty}, {candidate characteristics}, and {issues}.

{Party loyalty} is usually the single largest predictor of how someone will vote—in the range of {90}%.

Many people identify with a party due to {psychological attachment} (e.g. from youth/parents) or because the party's ideals match their {ideology}.

{Increasing polarization} describes Democrats and Republicans becoming more opposed to each other.

{Candidate characteristics} that matter include race, ethnicity, religion, gender, {geography} (where they're from), and personality.

{Retrospective} voting is choosing based on a candidate's past performance; {prospective} voting is based on imagined future performance.

{Spatial issues} have a range of options (e.g. minimum wage, taxes); {valence issues} are those where everyone prefers a higher value (e.g. transparency).

The {Bradley Effect} refers to polls being wrong because some voters told pollsters they would vote for a Black candidate but did not.

Issue voting adds {information costs} because voters must research past performance or imagine future performance.

Candidates often strive to appear like "{regular Joes and Janes}"; many in Congress are {millionaires} and college-educated.

# 39 Political Campaigns

A political campaign is an organized drive by a candidate to {get elected}; it also refers to the {organization} itself (staff, volunteers, activities).

The {DNC} and {RNC} are the national committees that coordinate all national campaigns, especially for President.

Each house of Congress has Republican and Democratic {campaign committees}, headed by sitting members; their leaders are popular because they give money to candidates.

Campaigns communicate through {stump speeches}, TV, debates, town meetings, {direct mail}, press releases, and {advertisements}.

Campaigns now use {email}, {Twitter}, {Facebook}, and YouTube ads to reach voters.

Campaigns need money for ads, travel, and staff; {raising money} also presents information because solicitations often include policy positions.

Campaigns are expensive because they are {huge} (e.g. reaching 220 million voting-age people), {long}, and rely on expensive {TV} and visual media.

In 2012 the presidential candidates spent about {1 billion} dollars each, and outside groups spent a further {4} billion.

Congress passed the {Federal Election Campaign Act} of 1971, refined by {McCain-Feingold} in 2002 and by court decisions.

{Buckley v. Valeo} was until recently the most important case on campaign finance.

Campaign contributions can give the {appearance of impropriety} when officials who receive money from an industry then work for that industry's interests.

Americans expect campaigns to be {personal}; candidates show up in Iowa and New Hampshire even though those states are small.

# 40 Political Parties

A {political party} is a team of politicians, activists, and voters whose goal is to {win control of government}.

Parties exist mainly to {win elections}; influencing policy is mainly the job of {interest groups}.

Parties facilitate {collective action} in the electoral process by making it easier for voters to form groups that vote in certain ways.

Parties facilitate {policy making} by allowing elected members of the same party to work together.

Parties help deal with politicians' {ambition} by providing a structure and career ladder so similar candidates don't all run against each other.

The five main functions of parties: {recruit} candidates, {nominate} candidates, {get out the vote}, facilitate electoral choice, and influence national government.

{Nomination} is the process through which a candidate is chosen to represent a party in an election; for the presidency this happens mainly through {primaries}.

In {closed} primaries only registered members of that party can vote; in {open} primaries any voter can participate (which can allow mischief).

Primary winners get {delegates} who nominate the candidate at the convention; {majority} rules in nominating.

Only about {25}% of those eligible actually vote in primary elections.

Conventions still occur every four years but are largely {ceremonial} because the nominee is usually decided in the primaries.

# 41 Party Systems

Political historians divide American history into {party systems}—eras according to which parties were active; there have been {5 or 6} depending on who you ask.

There were no parties in 1788 partly because the framers feared {factions} (Madison's word) and there was agreement that {George Washington} should be first president.

The first party system (from ~1796) included the {Federalists} (Adams) and {Democratic-Republicans} (Jefferson).

The Federalists were supported by North-Eastern {business} elites; the Democratic-Republicans were more skeptical of {national} power.

The period 1815–1824 is sometimes called the "{Era of Good Feelings}" because the Federalists were no longer a factor.

The {1824} election (Adams vs. Jackson, decided in the House) helped launch the second party system; Jackson called it a "{corrupt bargain}."

The {Whigs} were the anti-Jackson party; the Democratic-Republicans re-branded as the "{Democrats}."

Under {Martin Van Buren}, the Democrats established a central party committee, state organizations, and {conventions} for nominating candidates.

"{Tippecanoe and Tyler too}" was the slogan for {William Henry Harrison} in 1840; the Whigs introduced political theater (log cabin, parades).

The issue of {slavery} destroyed the Whigs; {Abraham Lincoln}'s election in 1860 ushered in the third party system.

The Republican party was originally a conglomeration of reformers against {slavery}; their early cry was "Free soil, free labor, free men."

{Political machines} traded political appointments for support; the most famous were in big cities like Boston and New York, mostly {Democratic}.

# 42 Interest Groups

An {interest group} is an organized group of individuals that make policy-related appeals to government.

Interest groups try to {shape policies} (by mobilizing voters or pressuring officials) and {gather information} to provide to officials.

Interest groups focus most on {Congress}, though they also target the {bureaucracy} because agencies need information and can be underfunded.

The {iron triangle} refers to the combination of interest groups, Congress, and the bureaucracy.

Interest groups often have lawyers who propose {language} that can become part of bills; this is more common at the {state and local} level.

Wealthy interests can be more effective providing information to {agencies} and writing {regulations} than only lobbying Congress.

An interest group is not a {political party} (parties exist to get candidates elected; interest groups exist to influence policy).

Interest groups are not the same as {PACs}; a PAC collects and distributes campaign funds; interest groups can form or fund PACs.

The {pluralist} argument: if all groups can compete, they balance each other out; Madison argued for extending the sphere and encouraging more {factions}.

Interest groups offer more opportunity for {participation} in politics between elections.

Critics say well-funded groups have {disproportionate} influence and that the system favors {wealthy} interests.

# 43 Interest Group Formation

{Collective action problems} occur when people should work together but don't (e.g. building a road no one individual could build).

{Free riding} is when people benefit from a project without paying their share because they know it will get done anyway.

The free rider problem is worse in {larger} groups, which partly explains why {smaller} groups (e.g. producers, business) are better represented than consumers or workers.

According to {Mancur Olson}, large groups solve collective action problems by providing {selective benefits} to members.

The four types of selective benefits: {material} (discounts, services), {informational}, {solidary} (friendship, networking), and {purposive} (feeling you're making a difference).

{AARP} is one of the largest interest groups and provides material benefits like discounts to members.

{Political entrepreneurs} are individuals who make extraordinary efforts to bring people together to change policy; they often benefit electorally.

{Claude Pepper} organized older Americans in Florida; {Robert Wagner} sponsored the National Labor Relations Act (Wagner Act), helping create power for labor unions.

{Lobbying} is an attempt to influence policy by persuading a government official; it can mean providing {information} or (in popular view) campaign contributions for favorable policy.

{Insider} strategies include directly contacting officials; {outsider} strategies include mobilizing the public (ads, protests).

There is no strong evidence of explicit {quid pro quo} (contributions for votes), but the appearance of influence is powerful.

# 44 Media Institutions

The main function of the media in politics is to provide {information} so people can make decisions; for economists, the media lowers {information costs}.

{Print} media (newspapers, magazines) is no longer the main source for most Americans but other news organizations still rely on it; the {New York Times} and {Washington Post} break most major stories.

Print is still the main source of news for {educated elites}, whose opinions matter in making policy.

{Broadcast} media (television, radio) still reaches more Americans than any other form; TV stories are usually under {two} minutes.

{Conservative talk radio} matters a lot in the political media landscape.

The Internet can update {quickly}, good for breaking news, but may push outlets toward more stories and "{hot takes}" rather than deep reporting.

Politicians and campaigns use {Twitter}, {Facebook}, and other social media; this is hardly {unbiased} news if it's your only source.

News financed by {advertising} may have an incentive not to report critically on parent organizations or advertisers.

The New York Times and Washington Post tend to be more {liberal}; the Wall Street Journal, Fox News, and talk radio tend to be more {conservative}.

The most persistent bias in the news is toward {conflict} and {scandal}, not necessarily liberal or conservative issues.

Journalists have {discretion} to report and interpret the news; "all the news that's fit to print" suggests selection and judgment.

# 45 Media Regulation

Print media has very few government regulations because of the {First Amendment} and freedom of the press.

{Near v. Minnesota} said there could be no prior restraint; {New York Times v. United States} (Pentagon Papers) made it hard to use national security to prevent publication.

For libel of public figures, {New York Times v. Sullivan} requires showing the statement was untrue and published with {actual malice} or reckless disregard for the truth—a very high bar.

{Broadcast} media is the most tightly regulated because it reaches the largest numbers; the airwaves are a limited resource owned by the {public}.

Broadcasters need a {license} from the federal government to operate; licenses are renewed every {five} years.

The {FCC} (Federal Communications Commission), founded in 1934, grants licenses and regulates broadcasters.

Stations had to show they were operating in the {public interest}; the {Fairness Doctrine} (1949) required equal time for each side of a public issue.

The Fairness Doctrine was repealed under {Reagan}; Congress voted to reinstate it in 1987 but Reagan {vetoed} it.

The {Equal Time} Rule requires broadcasters not to discriminate in selling time to political candidates; the {Right of Rebuttal} ensures a candidate can respond to a personal attack.

{FCC v. Pacifica} established the FCC can require certain language and images not be broadcast during "{family times}" (before 10 PM).

FCC rules on obscenity/indecency apply to {broadcast} media, not most basic {cable} channels.

The {Communications Decency Act} (part of the 1996 Telecommunications Act) was struck down as overbroad and violating the First Amendment.

The Internet is largely {self-regulating}; Congress has had difficulty regulating it because it changes so quickly.

# 46 Market Economy

Without some {government}, a market economy would not be possible; government structures the economy in many ways.

Government creates/maintains a market economy by: establishing {law and order}; defining rules of {property}; governing rules of {exchange}; setting {market standards}; providing {public goods}; creating a {labor force}; ameliorating {externalities}; and promoting {competition}.

{Law and order} provides predictability and a legal system that can punish {fraud}.

Property rights are a {bundle of rights} establishing what you can do with something; {trespass} laws are an example of laws protecting property.

Rules of exchange: some things cannot be sold (e.g. many drugs, selling yourself into slavery, organs); {blue laws} restrict alcohol sales on certain days; {Prohibition} was the 18th Amendment.

Government sets {weights and measures} (market standards) so buyers and sellers operate on the same playing field.

{Public goods} can be enjoyed by everyone and once provided cannot be denied to a subset; examples include {public transportation} and national defense.

Government helps create a labor force through {education} policy and {immigration} policy.

Government ameliorates {externalities} (e.g. pollution) and promotes {competition} (e.g. antitrust) to maintain markets.

# 47 Government Regulations

Goals of economic policy include: promoting {stable} markets, promoting economic {prosperity}, promoting {business development}, and protecting {consumers} and {employees}.

National regulations (e.g. automobile {fuel efficiency} standards) keep markets predictable so manufacturers know what to build across states.

The government promotes prosperity by regulating financial markets through the {SEC} (Securities and Exchange Commission), investing in infrastructure, and funding research (e.g. {NIH}, {NSF}).

The government uses the {Federal Reserve} to help control inflation.

The federal government promotes business through {tariffs} and {subsidies}; since the Great Depression the U.S. has pursued {free trade} (lowering tariffs).

{Direct subsidies} (e.g. Small Business Administration, farm subsidies) are controversial; {grants-in-aid} for transportation are indirect subsidies often seen as public goods.

The {National Labor Relations Act} made unionization easier; the {Fair Labor Standards Act} set labor standards including overtime.

{OSHA} (Occupational Safety and Health Administration) sets regulations to protect workers from hazards.

The {FDA} ensures medicines are safe; the Department of {Agriculture} inspects meat; the Consumer Products Safety Commission protects against dangerous products.

# 48 Monetary and Fiscal Policy

{Monetary policy} is the way the government regulates the amount of {money} in circulation; the {Federal Reserve} controls the money supply.

The Fed was created in {1913}; it is made up of {12} regional banks and the Federal Reserve Board of Governors and the Federal Open Market Committee.

The Fed's two primary tasks are to control {inflation} and encourage {full employment}.

The Fed loans money to banks and sets the {discount rate}; the lower the rate, the more banks borrow and the more money goes into circulation.

{Fractional reserve banking} means banks hold only a fraction of deposits in reserve; the {reserve requirement} helps prevent bank runs.

{Open Market Operations} means the Fed buys and sells government {bonds}; selling bonds takes money out of the economy, buying puts more in.

{Quantitative easing} involved the Fed buying bonds to put more money into the economy.

The Fed is {independent}—not elected, not subject to much congressional regulation—so it can focus on broader interests than re-election.

{Fiscal policy} is the government's use of {taxes} and {spending}; Americans have been reluctant to raise taxes and sometimes to spend, which helps explain {deficits}.

The government borrows by selling {bonds} when it spends more than it takes in.

{Supply-side economics} (associated with Reagan) holds that lowering taxes on businesses and individuals leads to more spending, investment, and growth.

# 49 Social Policy

Social policy deals with things like {Social Security}, {education}, and {healthcare}.

Social programs seek to: protect against {risk and insecurity} (job loss, health, disability); promote {equal opportunity}; and assist the {poor}.

Americans have traditionally been suspicious of social policy due to faith in {individualism} and preference for private charity and self-reliance.

The history of federal social policy largely starts with the {New Deal}; the {Great Depression} changed the question from "if" the government should help to "how."

{Social Security} (1935) provides monthly payments to people over 65; it is funded by {payroll taxes} (6.2% from worker, matched by employer; 1.45% for Medicare).

Social Security is not a {savings} program; today's workers pay today's retirees—it {redistributes} wealth from younger to older and from richer to poorer.

Benefits are {indexed} to inflation; there is a {cap} on the salary subject to the payroll tax.

{Medicare} provides health coverage for older people and is paid by payroll taxes; it is under pressure from demographics and rising {medical costs}.

{AFDC} (Aid to Families with Dependent Children) was what Americans often meant by "welfare"; it was unpopular and no longer exists in that form.

# 50 Foreign Policy

{Foreign policy} is the collection of policies that determine America's relations with other nations; it is both the least and most important—most important in impact, least in direct effect on how Americans think about government and least {democratic}.

Foreign policy includes: {diplomacy}; military and security policy; international {human rights}; economic policies (trade, energy); and {environmental} policy.

Goals of foreign policy: provide {security}; create {prosperity}; and make the world a better place (human rights, peacekeeping, environment).

Security has grown to include physical security, {transportation}, {energy}, {cybersecurity}, {food} security, and {terrorism}.

{George Washington} urged avoiding "foreign entanglements"; the U.S. was largely {isolationist} until the World Wars.

After WWII, security policy developed into {deterrence}—building military strength to discourage attack (e.g. by the Soviet Union).

Since 2001 the U.S. has pursued a global war on terror, including the doctrine of {preemptive} war.

Economic goals: expand opportunities, promote foreign investment, maintain access to {energy}, promote {trade} (e.g. WTO, NAFTA, "most favored nation" status).

The {President} is the nation's chief diplomat—receives ambassadors, negotiates treaties; the Constitution envisioned one person dealing with kings and emperors.

Foreign policy is the least {democratic} because the president and executive agencies (State Department, Pentagon, CIA, NSA) do most of the day-to-day work; Congress has limited direct role.

The U.S. is a party to many {human rights} treaties but has a complicated relationship with the UN and has not joined the International {Criminal} Court.

</textarea>

  <script>
    (function() {
      const HARDCODED_QUESTIONS = document.getElementById('questions-data').value.trim();

      function parseSections(text) {
        const sections = [];
        const lines = text.split(/\r?\n/);
        let currentSection = null;
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const headerMatch = line.match(/^#\s+(.+)$/);
          if (headerMatch) {
            const title = headerMatch[1].trim();
            if (currentSection && (currentSection.questions.length > 0 || currentSection.title !== 'Crash Course Government & Politics — All Questions')) {
              sections.push(currentSection);
            }
            currentSection = { title, questions: [] };
            continue;
          }
          const trimmed = line.trim();
          if (!trimmed || !currentSection) continue;
          if (currentSection.title === 'Crash Course Government & Politics — All Questions') continue;
          if (trimmed.indexOf('{') !== -1 && trimmed.indexOf('}') !== -1) {
            currentSection.questions.push({ type: 'fill', text: trimmed });
          } else if (trimmed) {
            const nextLine = (lines[i + 1] || '').trim();
            const hasAnswer = nextLine && !nextLine.startsWith('#');
            currentSection.questions.push({ type: 'qna', text: trimmed, answer: hasAnswer ? nextLine : '' });
            if (hasAnswer) i++;
          }
        }
        if (currentSection && currentSection.questions.length > 0) sections.push(currentSection);
        return sections;
      }

      function renderFillLine(text) {
        const parts = [];
        let pos = 0;
        const re = /\{([^}]+)\}/g;
        let m;
        while ((m = re.exec(text)) !== null) {
          if (m.index > pos) parts.push({ t: 'text', v: text.slice(pos, m.index) });
          const ans = m[1].trim().split('|')[0].trim();
          parts.push({ t: 'spoiler', v: ans });
          pos = m.index + m[0].length;
        }
        if (pos < text.length) parts.push({ t: 'text', v: text.slice(pos) });
        return parts;
      }

      function createCard(index, item, sectionKey) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.sectionKey = sectionKey;
        if (item.type === 'fill') {
          const q = document.createElement('q');
          q.innerHTML = '<span class="q-num">Q' + index + '.</span> ';
          const parts = renderFillLine(item.text);
          parts.forEach(p => {
            if (p.t === 'text') {
              q.appendChild(document.createTextNode(p.v));
            } else {
              const span = document.createElement('span');
              span.className = 'spoiler';
              span.textContent = p.v;
              span.addEventListener('click', function() {
                this.classList.toggle('revealed');
              });
              q.appendChild(span);
            }
          });
          card.appendChild(q);
        } else {
          const q = document.createElement('q');
          q.innerHTML = '<span class="q-num">Q' + index + '.</span> ' + escapeHtml(item.text);
          card.appendChild(q);
          if (item.answer) {
            const ansBlock = document.createElement('div');
            ansBlock.className = 'answer-block';
            const ansSpan = document.createElement('span');
            ansSpan.className = 'spoiler answer-spoiler';
            ansSpan.textContent = item.answer;
            ansSpan.addEventListener('click', function() { this.classList.toggle('revealed'); });
            ansBlock.innerHTML = '<span class="a-label">A: </span>';
            ansBlock.appendChild(ansSpan);
            card.appendChild(ansBlock);
          }
        }
        card.appendChild(document.createElement('div')).className = 'sep';
        return card;
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      const sections = parseSections(HARDCODED_QUESTIONS);
      const navList = document.getElementById('nav-list');
      const moduleTitle = document.getElementById('module-title');
      const questionsPane = document.getElementById('questions-pane');
      const statsRow = document.getElementById('stats-row');
      const statsLabel = document.getElementById('stats-label');

      sections.forEach((sec, idx) => {
        const key = 's' + idx;
        const btn = document.createElement('button');
        btn.className = 'nav-item';
        btn.textContent = sec.title;
        btn.dataset.sectionKey = key;
        btn.addEventListener('click', () => selectSection(key));
        navList.appendChild(btn);
      });

      function selectSection(key) {
        document.querySelectorAll('.nav-item').forEach(b => {
          b.classList.toggle('active', b.dataset.sectionKey === key);
        });
        const idx = parseInt(key.slice(1), 10);
        const sec = sections[idx];
        if (!sec) return;
        moduleTitle.textContent = sec.title;
        statsRow.style.display = 'flex';
        statsLabel.textContent = sec.questions.length + ' questions';
        questionsPane.innerHTML = '';
        sec.questions.forEach((item, i) => {
          questionsPane.appendChild(createCard(i + 1, item, key));
        });
        document.body.classList.remove('nav-open');
      }

      document.getElementById('btn-modules').addEventListener('click', () => {
        document.body.classList.toggle('nav-open');
      });
      document.getElementById('sidebar-backdrop').addEventListener('click', () => {
        document.body.classList.remove('nav-open');
      });

      document.getElementById('btn-show-all').addEventListener('click', () => {
        questionsPane.querySelectorAll('.spoiler').forEach(el => el.classList.add('revealed'));
      });
      document.getElementById('btn-hide-all').addEventListener('click', () => {
        questionsPane.querySelectorAll('.spoiler').forEach(el => el.classList.remove('revealed'));
      });

      if (sections.length > 0) selectSection('s0');
    })();
  </script>
</body>
</html>
