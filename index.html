  <textarea id="questions-data" style="display:none"># Crash Course Government & Politics — All Questions
    # 02 Bicameral Congress
    
    According to the Constitution, Congress is the most {important} branch of government.
    
    The Constitution consists of {seven} articles and {28} amendments.
    
    Article {I}, Section {I} states that all legislative powers shall be vested in a Congress of the United States.
    
    Congress consists of a {Senate} and a {House of Representatives}.
    
    A two-house legislature is called {bicameral}.
    
    To serve in the House of Representatives, you must be {25} years old, a citizen for {seven} years, and a resident of the state.
    
    Representation in the House is determined by {population}.
    
    There are {435} members of the House of Representatives.
    
    The Senate has {two} senators from each state for a total of {100}.
    
    To be a senator, you must be at least {30} years old, a citizen for {nine} years, and a resident of the state.
    
    Originally, senators were chosen by {state legislatures}, but this changed with the {17th} amendment.
    
    The {House of Representatives} has the power to impeach the president and other federal officials.
    
    Impeachment is like a {criminal indictment}.
    
    Once an official is impeached, the trial happens in the {Senate}.
    
    If the President is impeached, the {Chief Justice of the Supreme Court} presides over the trial.
    
    The House decides {presidential elections} if no candidate wins the majority of the electoral college.
    
    All bills for raising revenue must originate in the {House of Representatives}.
    
    The House's power over revenue bills is sometimes called {The Power of the Purse}.
    
    The {Senate} holds impeachment trials.
    
    The Senate has the power to {ratify treaties}, which requires a {two-thirds} vote.
    
    The Senate has the {confirmation} power to confirm the appointment of executive officers.
    
    There are over {1,000} offices requiring Senate confirmation, including federal judges.
    
    The historical reason for two houses was that framers couldn't agree on what type of legislature to have because they came from states with {different interests}.
    
    Large states wanted {proportional representation} based on population.
    
    Small states wanted {equal representation} in the legislature.
    
    Large states supported the {Virginia Plan}.
    
    Small states wanted the {New Jersey Plan}.
    
    The compromise was brokered by Connecticut's {Roger Sherman}.
    
    The compromise is called the {Connecticut Compromise} or {The Great Compromise}.
    
    The Great Compromise created an upper house with {equal representation} and a lower house with {proportional representation}.
    
    One reason to divide the legislature is to prevent the legislature from having {too much power}.
    
    In Federalist {51}, James Madison wrote about dividing the legislature into different branches.
    
    The idea that one house can limit the power of another house is called an {intrabranch check}.
    
    The Senate is sometimes called the {Upper House}.
    
    Senators serve {6} year terms.
    
    The Senate is supposed to be more {deliberative} and insulated from public opinion.
    
    The Senate is given the power to confirm {public ministers} and to {ratify treaties}.
    
    A representative who governs based on what he thinks is best rather than what people want is acting as a {trustee}.
    
    Representatives in the House are supposed to act in the role of {delegates}.
    
    Representatives serve {2} year terms.
    
    The House is given the power of the {purse} because it is closest to the people.
    
    # 03 Separation of Powers
    
    The two fundamental concepts of American government that are often confused are {separation of powers} and {checks and balances}.
    
    The national government is divided into {three} separate branches.
    
    The three branches of government are the {legislative} branch, the {executive} branch, and the {judicial} branch.
    
    The {legislative} branch comes first in the Constitution because it's supposed to be the most important branch.
    
    {Article I} is the longest and most detailed of the 7 Articles in the Constitution.
    
    The main job of the legislature is to {make laws}.
    
    {Article II}, Section {I} states "The executive power shall be vested in a President of the United States of America."
    
    The executive branch is in charge of {executing the law}, which means {carrying them out}.
    
    The President is like the {CEO} of the US, making sure that the government governs.
    
    The President's power as executive is found in the {Oath of Office}.
    
    The job of the judiciary, also called {the Courts}, is to {interpret the law}.
    
    {Article III} describes the judiciary and is shorter than Article II, with only {3} sections.
    
    Article III Section I states "The judicial power of the United States, shall be vested in one {Supreme Court}."
    
    {Congress} has the power to create all other courts besides the Supreme Court.
    
    Checks and balances means that each branch has the power to {limit} or {check} the other two branches.
    
    The Constitution gives the {legislature} the greatest number of checks on the other branches.
    
    The {House of Representatives} can impeach the President.
    
    The {Senate} can remove the President from office, but only if {two-thirds} of the Senators vote for impeachment.
    
    The Senate can check the President's appointment of judges and officials by rejecting them, which is known as {advice and consent}.
    
    Either branch of Congress can {investigate} executive activities and officers.
    
    If the President vetoes a law, Congress can override the veto with a {two-thirds} vote in both houses.
    
    Congress can refuse to {appropriate funds} for executive programs.
    
    Congress can {impeach} and {remove} judges.
    
    The {Senate} can reject judicial nominees.
    
    Congress can change the federal court system by {adding} or {taking away} courts.
    
    Congress can change the {jurisdiction} of federal courts.
    
    Congress can pass new laws that override Supreme Court decisions, as long as the decisions aren't based on the {Constitution}.
    
    As a last resort, Congress can propose {Amendments} to the Constitution.
    
    The {13th}, {14th}, and {15th} Amendments overruled the Dred Scott decision.
    
    The president can {veto} Congress' laws so that they don't go into effect.
    
    The president can call Congress into a {special session}, but he can't make them pass new laws.
    
    The {vice president} is given power to break ties in the Senate.
    
    The president nominates Supreme {Court justices} and {federal court judges}.
    
    The president can {pardon} people convicted by the courts.
    
    The president can refuse to {carry out court decisions}.
    
    Many political scientists consider the {judiciary} the weakest branch.
    
    The judiciary checks the legislature by declaring its laws {unconstitutional}.
    
    The {Chief Justice} presides over impeachment trials.
    
    The judiciary checks the executive branch by declaring {executive actions} unconstitutional.
    
    A good example of the judiciary checking executive actions was {Youngstown Sheet and Tube Company vs. Sawyer}.
    
    The big check that the courts have is {invalidating laws} and {executive actions}.
    
    The Framers of the Constitution were terrified of a {tyrannical central government}.
    
    The powers of the national government are {separated}, and each branch is able to {check} others.
    
    One of the best explanations of checks and balances comes from {Federalist 51}, written by {James Madison}.
    
    In Federalist 51, Madison wrote about giving each department the necessary {constitutional means} and {personal motives} to resist encroachments of the others.
    
    # 04 Federalism
    
    Federalism is the idea that in the US, governmental power is {divided} between the government of the United States and the government of the {individual states}.
    
    The government of the US, the national government, is sometimes called the {federal} government.
    
    The US can be considered a {federation of states}.
    
    In the federal system, the national government takes care of things like {war with other countries} and {delivering the mail}.
    
    State governments take care of things like {driver's licenses}, {hunter's licenses}, and {barber's licenses}.
    
    There are some aspects of government that are handled by both the state and national government, such as {taxes}.
    
    The two main types of federalism are {dual federalism} and {cooperative federalism}.
    
    Dual federalism usually refers to the period of American history that stretches from the {founding of our great nation} until the {New Deal}.
    
    Cooperative federalism has been the rule since the {1930s}.
    
    From {1788} until {1937}, the US basically lived under a regime of dual federalism.
    
    Under dual federalism, government power was {strictly divided} between the state and national governments.
    
    The division of power between state and national governments is sometimes called {jurisdiction}.
    
    The national government had jurisdiction over {internal improvements} like interstate roads and canals, {subsidies to the states}, and {tariffs}.
    
    Tariffs are {taxes on imports} and thus fall under the general heading of {foreign policy}.
    
    The national government also owns {public lands} and regulates {patents}.
    
    The national government controls {currency}.
    
    The state government had control over {property laws}, {inheritance laws}, {commercial laws}, {banking laws}, {corporate laws}, {insurance}, {family law}, {public health}, {education}, {criminal laws}, {land use}, {elections}, {local government}, and {licensing of professions and occupations}.
    
    Family law means {marriage and divorce}.
    
    Under dual federalism, the state government has jurisdiction over {a lot more} than the national government.
    
    Powers over health, safety and morality are sometimes called {police power} and usually belong to the states.
    
    Because of the strict division between the two types of government, dual federalism is sometimes called {layer cake federalism}.
    
    Dual federalism is consistent with the tradition of {limited government} that many Americans hold dear.
    
    Article I, Section 8 Clause 3 gives Congress the power "to regulate commerce with foreign nations, and among the several states, and with the Indian tribes." This is known as the {Commerce Clause}.
    
    The way that the Commerce Clause has been interpreted is the basis of {dual federalism} and {cooperative federalism}.
    
    For most of the 19th century, the Supreme Court decided that almost any attempt by any government to regulate state economic activity would {violate the Commerce Clause}.
    
    This basically meant that there was very little {regulation of business} at all.
    
    The Great Depression happened, and {Franklin Roosevelt} and Congress enacted the {New Deal}, which changed the role of the federal government in a big way.
    
    The New Deal brought us {cooperative federalism}, where the national government encourages states and localities to pursue {nationally-defined goals}.
    
    The main way that the federal government encourages states is through {money}.
    
    The money that the federal government gives to the states is called a {grant-in-aid}.
    
    Grants-in-aid can work like a {carrot} encouraging a state to adopt a certain policy or work like a {stick} when the federal government withholds funds.
    
    Grants-in-aid are usually called {categorical}, because they're given to states for a particular purpose like {transportation} or {education} or {alleviating poverty}.
    
    There are 2 types of categorical grants-in-aid: {formula grants} and {project grants}.
    
    Under a {formula grant}, a state gets aid in a certain amount of money based on a mathematical formula.
    
    The best example of a formula grant is the old way welfare was given in the US under the program called {Aid to Families with Dependent Children} or {AFDC}.
    
    {Project grants} require states to submit proposals in order to receive aid.
    
    The states {compete} for a limited pool of resources under project grants.
    
    Nowadays, {project grants} are more common than formula grants, but neither is as popular as {block grants}.
    
    The national government gives a state a huge chunk of money for something big, like {infrastructure}, and the state is allowed to decide how to spend the money.
    
    The basic type of cooperative federalism is the carrot stick type which is sometimes called {marble cake federalism} because it mixes up the state and federal governments.
    
    Another aspect of cooperative federalism that's really not so cooperative is {regulated federalism}.
    
    Under regulated federalism, the national government sets up {regulations} and {rules} that the states must follow.
    
    These rules are also called {mandates}.
    
    Some examples of mandates are {EPA regulations}, {civil rights standards}, and the rules set up by the {Americans with Disabilities Act}.
    
    Sometimes the government gives the states money to implement the rules, but sometimes it doesn't and they must comply anyways. That's called an {unfunded mandate}.
    
    A good example of an unfunded mandate is {OSHA regulations} that employers have to follow.
    
    Congress tried to do something about unfunded mandates with the {Unfunded Mandates Reform Act} or {UMRA}, but it hasn't really worked.
    
    In the early 21st century, Americans are basically living under a system of {cooperative federalism} with some areas of activity that are {heavily regulated}.
    
    The small government ideal is the bedrock principle of many {conservatives} and {libertarians} in the US.
    
    As conservatives made many political inroads during the {1970s}, a new concept of federalism became popular called {New Federalism}.
    
    New Federalism was popularized by Presidents {Nixon} and {Reagan}.
    
    New Federalism basically means giving {more power} to the states.
    
    New Federalism has been done in three ways: {block grants}, {devolution}, and cases based on the {10th Amendment}.
    
    {Block grants} allow states discretion to decide what to do with federal money.
    
    {Devolution} is the process of giving state and local governments the power to enforce regulations, devolving power from the national to the state level.
    
    The {10th Amendment} states "The powers not delegated to the United States by the Constitution, nor prohibited by it to the States, are reserved to the States respectively, or to the people."
    
    The idea that some powers, like those {police powers}, are reserved by the states, have been used to put something of a brake on the {Commerce Clause}.
    
    Presidents {Reagan}, {George H.W. Bush}, and {Clinton} seem to favor New Federalism and block grants.
    
    {George W. Bush} seemed to push back towards regulated federalism with laws like {No Child Left Behind} and the creation of the {Department of Homeland Security}.
    
    It's pretty safe to say that we're going to continue to live under a regime of {cooperative federalism}, with a healthy dose of {regulation} thrown in.
    
    Many Americans feel that the national government is too {big} and {expensive} and not what the {framers} wanted.
    
    If history is any guide, a system of {dual federalism} with most of the government in the hands of the states is probably not going to happen.
    
    It's really difficult to convince institutions to {give up powers} once they've got them.
    
    # 05 Constitutional Compromise
    
    The government set up by the Constitution is actually the {second} attempt at an American government.
    
    The first American government was the {Articles of Confederation}.
    
    The Articles government was in place during the {Revolutionary War} and for almost {10} years afterwards.
    
    The Articles government had no {executive branch} or {president} and no {judiciary} to settle disputes.
    
    The Articles government had no power to {levy taxes}, which meant it had to {ask for money} from the states.
    
    The Articles government was able to accomplish the {Northwest Ordinance} of {1787}, which set up a system for eventual statehood.
    
    The Northwest Ordinance forbade {slavery} in the territories.
    
    The issue of competing interests was between states with {large populations} and {smaller states}.
    
    The {Virginia Plan} called for a congress where the number of representatives would be {proportional} to the states' populations.
    
    The {New Jersey Plan} called for a congress where each state would send an {equal} number of representatives.
    
    {Roger Sherman} from {Connecticut} proposed The Great Compromise.
    
    The Great Compromise gave us the {bicameral legislature}.
    
    The membership in the {House} would be based on the state's population.
    
    The issue about how to count population was about {slavery}, specifically how to count {slaves} as part of a state's population.
    
    States with large slave populations, like {South Carolina} and {Virginia}, wanted slaves counted for representation.
    
    States with few slaves {didn't want them counted at all}.
    
    Article {1}, Section {2} of the Constitution includes the Three-Fifths Compromise clause.
    
    The Three-Fifths Compromise states that representatives shall be apportioned by adding to the whole number of {free persons}, including those bound to service, and {three-fifths} of all other persons.
    
    In the Constitution, slaves are described as {three-fifths of all other persons}.
    
    In terms of counting, each slave was worth {three-fifths} of each free person.
    
    The Three-Fifths Compromise enshrined the idea that {slaves} were worth less than {free people}.
    
    The Three-Fifths Compromise {embedded slavery} into the Constitution.
    
    The Constitution had to be ratified by at least {9} of the {13} states.
    
    Each state had a special {convention} where delegates could vote on whether to adopt the new constitution.
    
    Those who wanted the Constitution were called {Federalists}.
    
    The {Federalist Papers} were written by {Alexander Hamilton}, {James Madison}, and {John Jay}.
    
    The Federalist Papers were written to convince voters in {New York} to ratify the Constitution.
    
    Federalists thought that a {strong central government} would benefit the country.
    
    Federalists tended to come from {cities} and represented {commercial classes}, especially {wealthy people}.
    
    Federalists liked the Constitution because they felt a strong national government would {pay its debts}.
    
    Federalists tended to want stronger ties with {England} because it was a good {trading partner}.
    
    Those who opposed the Constitution were called {Anti-Federalists}.
    
    Anti-Federalists were skeptical of a {large government} that would {trample on individual liberties}.
    
    Anti-Federalists felt that {states} would be the best protectors of people's rights and liberties.
    
    The {Federalist} position won out and the Constitution was ratified.
    
    The Federalists had to offer another compromise, promising a {Bill of Rights} in the first {ten} amendments.
    
    The Bill of Rights compromise happened {outside of the Convention}.
    
    {Compromise}, the idea of balancing interests and giving a little to get a lot, is embedded in the Constitution.
    
    # 06 Congress Elections
    
    Constitutionally, {Congress} is the most important branch of government because it is supposed to be the most responsive to the people.
    
    One of the main reasons Congress is responsive is the {frequency} of elections.
    
    The House of Representatives is composed of members chosen every {second} year by the people.
    
    {One-third} of the Senate is up for election every two years.
    
    The Constitution mainly leaves the scheduling and rules of elections up to the {states}.
    
    The number of House districts is determined by the {Census}, which happens every {10} years.
    
    Elections ending in {zeros} are super important because of {gerrymandering}.
    
    In the House of Representatives, each election district chooses a single representative, which is why we call them {single-member districts}.
    
    Both state Senators are elected by the {entire state}.
    
    Elections where the entire state votes are sometimes called {at-large} elections.
    
    Candidates usually need an {unblemished record}, free of felony convictions or sex scandals.
    
    The second characteristic that a candidate must possess is the ability to {raise money}.
    
    In 2012, winners of House races spent nearly {2 million} each.
    
    In 2012, Senate winners spent more than {10 million}.
    
    The person holding an office who runs for that office again is called the {incumbent}.
    
    Political scientists refer to the advantage incumbents have as {incumbency advantage}.
    
    A sitting congressman has a {record} to run on, which includes legislative accomplishments.
    
    {Case work} is providing direct services to constituents, usually done by congressional staffers.
    
    Congressmen can provide {jobs} to constituents, which is usually a good way to get them to vote for you.
    
    Government jobs provided to constituents are called {patronage}.
    
    Indirect employment through government contracts for programs within a Congressman's district are called {earmarks} or {pork barrel programs}.
    
    The second advantage that incumbents have is that they have a record of {winning elections}.
    
    Each elected congressman is allowed ${100,000} and free postage to send out election materials.
    
    The privilege of free postage for congressmen is called the {franking privilege}.
    
    Over the past 60 years, almost {90%} of members of The House of Representatives got re-elected.
    
    Even at the low point in 1980, more than {50%} of sitting senators got to keep their jobs.
    
    In 1974, political scientist {David Mayhew} published a book describing "The Electoral Connection."
    
    The Electoral Connection is the idea that Congressmen were primarily motivated by the desire to {get re-elected}.
    
    Mayhew divided representatives' behaviors and activities into {three} categories.
    
    The first category of congressional activity is {advertising}, where congressmen work to develop their personal brand.
    
    Al D'Amato used to be known in New York as {Senator Pothole} because he was able to bring home so much pork.
    
    The second activity is {credit claiming}, where Congressmen get things done so that they can say they got them done.
    
    {Position taking} means making a public judgmental statement on something likely to be of interest to voters.
    
    Senators can do position taking through {filibusters}.
    
    Representatives can't filibuster, but they can hold {hearings}.
    
    Representatives can also go on {TV}, especially on {Sunday talk shows}.
    
    # 07 Congress Committees
    
    Both the House of Representatives and the Senate are divided up into {committees} in order to make them more efficient.
    
    The committees you hear about most are the {standing committees}, which are relatively permanent and handle the day-to-day business of Congress.
    
    The House has {19} standing committees and the Senate {16}.
    
    Each committee has a {chairperson} or {chair}, who is the one who usually gets mentioned in the press.
    
    Congress creates {special} or {select} committees to deal with particular issues that are beyond the jurisdiction of standing committees.
    
    Some committees have only an {advisory} function, which means they can't write laws.
    
    There are {joint} committees made up of members of both houses.
    
    {Conference} committees are created to reconcile a bill when the House and Senate write different versions of it.
    
    The main reason Congress has so many committees is that it's more {efficient} to write legislation in a smaller group rather than a larger one.
    
    Congressional committees allow Congressmen to develop {expertise} on certain topics.
    
    Serving on a committee is something that a Congressperson can {claim credit} for and use to build up his or her brand when it comes time for reelection.
    
    Any member of Congress can propose a bill, which is called {proposal power}.
    
    To get to the rest of the House or Senate, a bill has to be {reported out} of committee.
    
    The {chair} determines the agenda by choosing which issues get considered.
    
    In the House, the {Speaker} refers bills to particular committees.
    
    The power to control what ideas do or do not become bills is what political scientists call {Gatekeeping Authority}.
    
    The committee chairs manage the actual process of writing a bill, which is called {mark-up}.
    
    If a bill doesn't receive a {majority} of votes in the committee, it won't be reported out to the full House or Senate.
    
    If a bill doesn't make it out of committee, we say the bill {died in committee}.
    
    It is possible in the House to force committees to vote by filing a {discharge petition}, but this almost never happens.
    
    {Gatekeeping Authority} is Congress's most important power.
    
    Congress also has {oversight} power, which is an after-the-fact authority to check up on how law is being implemented.
    
    Committees exercise oversight by assigning staff to scrutinize a particular law or policy and by holding {hearings}.
    
    Holding hearings is an excellent way to {take a position} on a particular issue.
    
    The changes that bent Congress into its current shape occurred under the speakership of {Newt Gingrich} in {1994}.
    
    Overall Gingrich increased the power of the {Speaker}, who was already pretty powerful.
    
    The number of {subcommittees} was reduced under Gingrich.
    
    {Seniority} rules in appointing chairs were changed under Gingrich.
    
    Before Gingrich, the chair of a committee was usually the {longest serving} member of the majority party.
    
    After Gingrich, Congress holds {votes} to choose the chairs.
    
    The {Republicans} also impose term limits on the committee chairs.
    
    There are two types of congressional staff: {Staff Assistants} that each Congressperson or Senator has, and {Staff Agencies} that work for Congress as a whole.
    
    Some staffers' job is to research and write {legislation} while others do {case work}.
    
    The {Congressional Research Service} is supposed to perform unbiased factual research for Congresspeople.
    
    The {Government Accountability Office} is a branch of Congress that can investigate the finances and administration of any government administrative office.
    
    The {Congressional Budget Office} assesses the likely costs and impact of legislation.
    
    When the CBO looks at the cost of a particular bill it's called {scoring the bill}.
    
    The Congressional reforms after 1994 generally {increased} the number of individual staff and {reduced} the staff of the staff agencies.
    
    {Caucuses} are semi-formal groups of Congresspeople organized around particular identities or interests.
    
    The {Congressional Black Caucus} is made up of the African American members of the legislature.
    
    The {Republican Study Group} is the conservative caucus that meets to discuss conservative issues.
    
    Since 2010 there is also a {Tea Party} caucus in Congress.
    
    The purpose of caucuses is for {like minded} people to gather and discuss ideas.
    
    Caucuses can help members of Congress {coordinate their efforts} and also provide {leadership opportunities} for individual Congresspeople.
    
    Committees, congressional staff, and caucuses all exist to make the process of {lawmaking} more efficient.
    
    Committees and staff allow individual legislators to develop {expertise}.
    
    Committees also serve a {political} function of helping Congresspeople build an identity for voters.
    
    When Congress doesn't pass many laws, {committee membership}, or better yet, being a {committee chair} is one of the only ways that a Congressperson can distinguish him or herself.
    
    # 08 Congress Leadership
    
    The leader of the House of Representatives is the {Speaker of the House}, the third most powerful person in the country.
    
    The Speaker is always elected by whichever party is in the {majority}.
    
    Speaker elections take place every {two} years because the whole House is elected every two years.
    
    The {Majority Whip} has the primary task of counting votes and making party members vote with their party.
    
    The third in line in the House is the {House Majority Leader}, who helps the majority and is chosen by the Speaker for being popular with factions.
    
    The party with fewer members is the {Minority Party}.
    
    The {Minority Leader} is the de facto spokesperson for the minority party in the House.
    
    The minority party also has a {Minority Whip} but no Speaker.
    
    The leader of the Senate is the {Majority Leader}, elected by the members of his or her party.
    
    The majority party in the Senate is the one with {51} or more members.
    
    The {Vice President} presides over the Senate when he doesn't have anything better to do.
    
    When the Vice President is absent, the {President pro tempore} presides over the Senate.
    
    The President pro tem is a largely {ceremonial} role given to the most senior member of the majority party.
    
    Senior in the Senate means {longest serving}, not necessarily oldest.
    
    The primary way leaders in both houses exercise power is through {committee assignments}.
    
    Leaders can reward members with good committee assignments or punish wayward members with {bad} ones.
    
    The {Speaker} of the House is especially powerful in assigning Congressmen to committees.
    
    Congressional leaders shape the {agenda} of Congress, having a huge say in which issues get discussed.
    
    How debate happens in the House is decided by the {House Rules Committee}.
    
    The Senate doesn't have a rules committee; the {body as a whole} decides debate length and amendments.
    
    Agenda setting is often a {negative} power, exercised by keeping items off the agenda.
    
    Congressional leaders have greater access to the {press} and especially TV.
    
    Each house has a special {campaign committee}; whoever chairs it can shift funds to key races.
    
    Leaders raise money and often give donations to {PACs} or political action committees.
    
    The phrase that captures why parties matter in Congress is {majority rules}.
    
    The majority party in each house is also the majority on all of that house's {committees}.
    
    The majority party chooses the {committee chairs}.
    
    Parties provide a framework for {cooperation} and a common set of values.
    
    When a party is more {unified}, it's easier for the leader to set an agenda.
    
    Lack of {party unity} can make it difficult for the leadership.
    
    In 2011, Congressmen associated with the {Tea Party} movement made it difficult for Speaker Boehner to put forward an agenda.
    
    # 09 How a Bill Becomes a Law
    
    The formal process of a bill becoming a law begins with a legislator {introducing} the bill.
    
    Ideas for laws can come from interest groups, the {executive branch}, or constituents.
    
    After introduction, a bill is {referred} to a committee.
    
    {Revenue} bills must start in the House of Representatives.
    
    The committee writes the bill in formal legal language, or {markup}, and votes on it.
    
    If the markup wins a {majority} in the committee, the bill moves to the floor.
    
    An {open} rule allows for amendments; a {closed} rule does not.
    
    Open rules make it {less} likely for bills to pass because opponents can add hostile clauses.
    
    In the House, all bills must go to the {Rules Committee} before going to the floor.
    
    A bill needs {238} or more votes to pass in the House.
    
    The exact same bill has to pass {both} houses before it can go to the president.
    
    When the two houses pass different versions, the bill goes to a {conference} committee.
    
    The conference committee produces a compromise version sometimes called a {compromise bill}.
    
    If the President neither signs nor vetoes and Congress adjourns within 10 days, it's called a {pocket veto}.
    
    If the President neither signs nor vetoes and Congress stays in session for 10+ days, the bill becomes law {without the President's signature}.
    
    Congress can override a veto with a {2/3} majority in both houses on a second vote.
    
    The {Taft-Hartley} Act of 1953 passed over Truman's veto.
    
    A bill can die if the Speaker or Majority Leader refuses to {refer} it to committee.
    
    A bill dies in committee if it doesn't get a {majority} of votes.
    
    In the Senate, leadership can kill a bill by refusing to {schedule} a vote on it.
    
    A {filibuster} is when a senator threatens to keep debating until the bill is tabled.
    
    The House doesn't have a filibuster but the Rules Committee can kill a bill by not creating a {rule} for debate.
    
    The House can vote to {recommit} the bill to committee, signaling to drop or change it.
    
    The many procedural points where a bill can die are sometimes called {veto gates}.
    
    Veto gates are purely {procedural}, so they don't draw much media attention.
    
    Congress can kill bills by simply not {voting} on them or scheduling votes.
    
    The process was designed to make it {difficult} to pass laws and reduce authoritarian legislation.
    
    The founders set up the {bicameral} Congress and presidential role to create structural hurdles.
    
    # 10 Congressional Decision Making
    
    The three main factors that influence how congressmen make decisions are {constituency}, {interest groups}, and {political parties}.
    
    Representatives pay the most attention to their constituents when {voting on bills}, because votes are a public record that constituents can check.
    
    Congressmen today often depend on direct service to constituents, or {case work}, to build up their record.
    
    Constituents' views can affect congressmen through {public opinion polling}, so representatives can anticipate what voters want.
    
    The main thing interest groups provide to congressmen is {information} for writing bills or making a policy case.
    
    Interest groups give money to campaigns and provide {research} and assistance in writing bills.
    
    Interest groups are most influential at the {committee} stage of legislation, not when casting floor votes.
    
    Interest group influence tends to be mostly {negative}, meaning it is easier to exclude provisions from laws than to insert them.
    
    Party leaders who pressure members to vote a certain way are called {whips}.
    
    The {Hastert Rule} meant the Speaker would only bring a bill to the floor if a majority of the majority party supported it.
    
    {Logrolling} is quid-pro-quo bargaining: you vote for my bill and I'll vote for yours.
    
    The president is the {de facto} leader of his or her party.
    
    The president has the most power when his party and the {majority party} in Congress are the same.
    
    {Divided government} is when the president and the congressional majority are in opposite parties.
    
    Under divided government, Congress can set its agenda by simply {opposing} whatever the president wants.
    
    Political parties are most influential when a single party controls {both houses} and the presidency.
    
    Party influence is strongest when party leadership is strong enough to exert {discipline} and uniformity.
    
    Besides constituency, interest groups, and parties, the {structures} of Congress condition every decision.
    
    Which party has the {majority} and thus controls leadership and committees often makes the most difference.
    
    Any congressional decision is the product of the complex {interaction} of many factors, only some of which are apparent.
    
    # 11 Presidential Power
    
    To be President of the United States, you must be at least {35} years old.
    
    The President must be a {natural-born} citizen of the United States or its territories.
    
    The President is not elected directly by the people but by the {Electoral College}.
    
    The Framers created the Electoral College because they didn't fully {trust} the popular vote.
    
    The President's powers can be described as {military}, judicial, diplomatic, legislative, and executive.
    
    As chief diplomat, the President's foreign policy power comes from his role in {diplomacy}.
    
    The President can propose laws but must get a Congressman or Senator to {introduce} them into Congress.
    
    {Executive} power—ensuring that the laws are carried out—is the President's most far-reaching power because it is the least well defined.
    
    Powers found in the Constitution are called {formal} or {expressed} powers.
    
    Informal powers come from {Congress} or the President himself.
    
    The first power given to the President in the Constitution is {Commander in Chief} of the Armed Forces.
    
    Only one president has led U.S. troops in the field while in office: {George Washington}, during the Whiskey Rebellion.
    
    The President has the power to make {treaties}, which are mostly written by State Department officials.
    
    The President appoints {ambassadors} and State Department officials.
    
    {Receiving} ambassadors is a significant power because it means recognition of that country's existence.
    
    The Constitution requires the President to inform Congress of the state of the Union from time to time, now done in the annual {State of the Union} address.
    
    {Woodrow Wilson} revived the practice of delivering the State of the Union as an actual speech.
    
    The State of the Union is a chance for the President to set the {policy agenda} for the next year.
    
    The President has the power to {veto} laws passed by Congress.
    
    The President can {convene} Congress into special sessions.
    
    The President can appoint judges only with the {consent} of the Senate.
    
    The President has the power to grant {pardons} and reprieves.
    
    The Framers deliberately gave the President {limited} powers because they feared a strong executive like a king.
    
    The Constitution's formal powers for the President are mainly found in {Article II}.
    
    # 12 Presidential Powers
    
    Powers not literally in the Constitution are called {informal} powers.
    
    Some presidential powers are {implied} by the wording of the Constitution; others are {inherent} in the office.
    
    Inherent powers are those that flow {logically} from the ideas in the Constitution.
    
    The Constitution gives {Congress} the power to declare war as a check on the President.
    
    The President has the inherent power to use troops even when Congress has not formally {declared war}.
    
    Most times America has sent troops to conflict in the 20th and 21st centuries, it was without a formal {declaration of war}.
    
    The {War Powers Resolution} requires the President to get authorization to use troops within 60 days or bring them back.
    
    In practice, Congress has always {authorized} the President to use force when he has committed troops.
    
    {Executive agreements} are agreements with foreign nations that look like treaties but are not formally treaties.
    
    Executive agreements do not need to be ratified by {2/3} of the Senate like treaties do.
    
    Executive agreements become valid with only a {majority} vote in both houses.
    
    Important executive agreements include {GATT} (now the WTO) and {NAFTA}.
    
    The President is effectively the {CEO} of the United States, though that title is not in the Constitution.
    
    The President's power to direct the executive branch comes in part from the {faithfully executed} clause in the oath of office.
    
    By appointing agency heads and cabinet secretaries, the President shapes the {political agenda} and how laws are implemented.
    
    The President's ability to recommend laws he would like passed is sometimes called the {Legislative Initiative}.
    
    In practice, executive branch officials often {draft} the legislation and give it to Congress to refine.
    
    Big agenda items like the Affordable Care Act and Dodd-Frank were written with substantial input from the {White House}.
    
    {Executive orders} are presidential directives that have the force of law.
    
    Executive orders can be overturned by {Congressional} lawmaking or by {Supreme Court} decisions.
    
    Executive orders allow the President to act {unilaterally} and circumvent the legislative process.
    
    Important policies made by executive order include desegregating the military and creating the {Environmental Protection Agency}.
    
    A later president can {reverse} an executive order just as easily as a predecessor put it in place.
    
    The President can {impound} funds that Congress has appropriated if he does not want a program implemented.
    
    {Executive privilege} is the President's ability to keep information secret by claiming it is too important to reveal.
    
    Executive privilege can be overturned by a {court order}, as in the case {U.S. v. Nixon}.
    
    In U.S. v. Nixon, the Court ordered Nixon to turn over tapes related to the {Watergate} scandal.
    
    Congress and the American people often {defer} to the President on military matters.
    
    Increased presidential power has often come from a president {seizing} the initiative and expanding inherent or implied power.
    
    Congress often willingly {hands over} more power to the President, which is a theme of later episodes.
    
    # 13 Congressional Delegation
    
    Congressional {delegation} happens when Congress gives or delegates a power to the Executive branch through legislation.
    
    Whenever Congress sets up an agency or program, it decides how much {discretion} to give the agency's personnel.
    
    The greater the discretion Congress gives an agency, the more {power} it delegates.
    
    Sometimes Congress writes laws with very specific instructions, severely limiting an agency's {discretion}.
    
    The {Tax Code} is about 2,600 pages long and is an example of Congress limiting an agency's discretion.
    
    Congress sometimes grants {broad} discretion to agencies, as with OSHA regulations.
    
    Delegated powers can still be checked by the {Courts}, which can review laws and bureaucratic rules.
    
    The Court overturned the {legislative veto} in the famous case INS v. Chadha.
    
    Congress delegates power for practical, {historical}, and political reasons.
    
    Congress delegates because it would be impossible for Congress to {administer} all the programs it creates.
    
    Execution of laws is the job of the {Executive} branch, which supports a constitutional argument for delegation.
    
    Writing detailed legislation is really hard, and Congressmen are not usually {experts} in the policies they create.
    
    Until the 20th century, most governing was done by the {states} under dual federalism.
    
    When Congress did delegate power early on, it sought to keep it away from the {President}.
    
    The {Interstate Commerce Commission} was set up as an independent regulatory commission to regulate railroads.
    
    The size and reach of the federal government really exploded with the {New Deal}.
    
    The New Deal was primarily a {legislative} program of laws that created new agencies and programs, not just executive orders.
    
    Congress often grants broad discretion so it can avoid {responsibility} and blame the Executive branch if a policy goes sour.
    
    Congress has the power to {rescind}, amend, or claim oversight over the powers it delegates.
    
    When there is {unified} government with one party controlling Congress and the White House, Congress tends to delegate more power to the Executive.
    
    After September 11th, Congress delegated a lot of authority to the Executive branch to protect Americans from {terrorism}.
    
    Overall, delegation represents a shift of power from the {Legislative} to the {Executive} branch.
    
    # 14 Presidents Governing
    
    The president is at the top of the organizational pyramid; just below him is the {vice president}.
    
    "The buck stops" with the president, meaning he has the ultimate decision and takes the {blame} when things go wrong.
    
    Many policy decisions are made at lower levels because there are too many for the president to make them all; the president is the {decider} on important matters.
    
    The president is served directly by the {White House Staff}, made up mostly of trusted policy and political advisors.
    
    White House advisors are often called {special assistants}.
    
    The {press secretary} is the public spokesperson for the president.
    
    Next in proximity and influence is the {Executive Office of the President}, or EOP, staffed by advisers and policy experts.
    
    Important EOP departments include the {National Security Council}, the Council of Economic Advisors, and the {Office of Management and Budget} (OMB).
    
    The {Cabinet} used to be very important in advising the president; the Secretary of State and Secretary of Defense often play a significant role.
    
    The {Attorney General} heads the Justice Department and becomes prominent when civil rights issues crop up.
    
    The Postal Service is a {government corporation}, meaning it is supposed to earn money and be self-funding.
    
    {Amtrak} is another well-known government corporation.
    
    {NASA} is probably the best-known independent agency.
    
    Regulatory commissions include the Federal Trade Commission, the {Securities and Exchange Commission}, and the {Federal Communications Commission}.
    
    The {Federal Reserve System} manages banking and monetary policy and is one of the most important independent federal agencies.
    
    The president's three main strategies to govern are party leadership, mobilizing public opinion, and {administrative} strategies.
    
    {Administrative strategy}—using administrative agencies to make and carry out policies—is the most important of the three.
    
    The president's use of the media to reach the public is sometimes called the {bully pulpit}.
    
    The president's approval rating almost always {declines} the longer he is in office.
    
    {Regulatory review} allows the president's office to review agency rules, make suggestions, or order agencies to adopt certain rules.
    
    A {signing statement} is the White House's interpretation of what a law means when the president signs a bill into law.
    
    The most important administrative strategy the president has is the {executive order}.
    
    Executive orders have been used for major policies like purchasing Louisiana, {emancipating} the slaves, and desegregating the army.
    
    Administrative strategies usually happen outside the {public eye}, making it easier for the president to act.
    
    Courts usually {defer} to administrative actions, especially in national defense.
    
    The president is the only {nationally} elected official and thus can be seen as the most democratic one.
    
    # 15 Bureaucracy
    
    A bureaucracy is a complex structure of offices, tasks, {rules}, and principles of organization used by large-scale institutions to coordinate work.
    
    Bureaucracies are made up of {experts} who usually know more about the topic than you do and can divide up complex tasks.
    
    All large-scale institutions use bureaucracies, so the distinction between big business and big government is in this respect a false {dichotomy}.
    
    The main reason we have bureaucracies is that they are {efficient} and make it easier for governments to accomplish tasks.
    
    Bureaucrats {implement} the laws that Congress writes.
    
    Bureaucrats also make and enforce their own {rules}.
    
    Bureaucrats settle disputes through a process called {administrative adjudication}, which makes them somewhat like courts.
    
    The big concern with bureaucracies is {separation of powers}, since the bureaucracy is part of the executive branch but can dwarf the other branches.
    
    Bureaucracies don't just enforce rules; they make new ones called {regulations}, which have the force of law.
    
    If you break an FCC rule, the FCC can {fine} you, similar to law enforcement punishing you for breaking a state law.
    
    Congress called for a mandatory {notice and comment} period on new FCC rules regarding net neutrality; any person can offer public comment.
    
    The bureaucracy is required to read comments, which can be incorporated into the final rules published in the {Federal Register}.
    
    Federal rule-making can be more {democratic} than congressional law-making in terms of public participation.
    
    Congress has the right to establish courts other than the Supreme Court, and these can include {administrative tribunals} that are part of bureaucratic agencies.
    
    Many lower-level bureaucratic positions are filled through competitive exam-based {civil service} procedures.
    
    Many upper-level leaders, especially {cabinet secretaries} and ambassadors, are very political and appointed by politicians.
    
    One reason we have bureaucracies is that {Congress} keeps making them and delegating power to them.
    
    Once Congress makes a bureaucracy it is usually {permanent} for practical and political reasons.
    
    Bureaucracies provide a certain amount of {stability} and built-up expertise.
    
    The {DMV} is a state bureaucracy, not a federal one; most bureaucrats you meet daily work for state government.
    
    The Framers intended most governing to be done by {state} government, not the federal government.
    
    # 17 Controlling Bureaucracies
    
    Two broad categories of controlling bureaucracies are limiting bureaucrats' {discretion} and shrinking the size and number of bureaucracies.
    
    Limiting the activities of bureaucracies without getting rid of them is {easier} and therefore more common.
    
    {Before-the-fact} controls limit bureaucrats' discretion through the way the bureaucracy is set up.
    
    The best way to limit discretion is through careful {drafting} of the legislation that creates the bureaucracy.
    
    Congress frequently forbids agencies from funding or discussing {abortions} or abortion counseling; this is a type of procedural control.
    
    {Reporting requirements} are forms that agencies must send to oversight agencies detailing what they actually did.
    
    Congress can influence the appointment of agency heads, although the Senate can only {veto} them, not appoint them.
    
    {After-the-fact} controls are often just called oversight and extend beyond it.
    
    Congress can exercise public oversight by holding {hearings}.
    
    Congress has its own watchdog that checks how bureaucracies spend money: the {General Accounting Office}.
    
    Congress can institute {investigations}, which are less public than hearings and result in a report.
    
    The best way to control what a bureaucracy can do is through the {appropriations} process.
    
    Giving an agency less money, or threatening to, is one of the best ways to get it to do {less}.
    
    Getting rid of an agency completely is called {termination} and almost never happens.
    
    Bureaucracies create {constituencies} for themselves and can lobby persuasively for their continuation.
    
    {Deregulation} is when Congress limits the number of regulations an agency is allowed to enforce.
    
    Deregulation is often based on the idea that {market forces} will step in to keep whatever was regulated under control.
    
    {Externalities} are the social costs of an activity that are not paid for by the industry; pollution is an example.
    
    {Devolution} is when Congress shifts the task of regulation from a federal agency to state and local municipalities.
    
    Devolution may shrink the federal bureaucracy but the total level of bureaucratic function remains the same unless Congress cuts funding, creating an {unfunded mandate}.
    
    {Privatization} means turning over bureaucratic functions to private entities, usually corporations.
    
    President George W. Bush proposed privatizing part of {Social Security} by allowing individuals to invest retirement funds with private companies.
    
    Private {military contractors} have taken over some jobs previously done by the army.
    
    Bureaucracies have grown since the New Deal and don't show much sign of {slowing down}.
    
    President Bush added a cabinet agency, the Department of {Homeland Security}.
    
    Bureaucracies are {political} entities and subject to political pressure despite efforts to keep them out of politics.
    
    # 18 Legal System
    
    Courts have three basic functions: settle disputes, {interpret} the laws, and create expectations for future actions.
    
    In pre-modern history, {kings} performed the function of settling disputes; as states grew, specialized officials took over.
    
    The second thing courts do is {interpret} the laws, which becomes important when you try to read laws or when legislators are not precise.
    
    Courts create {expectations} for future actions, so people know they will be punished for cheating and are more likely to do business.
    
    Most legal action in the U.S., if it occurs in court at all, occurs in {state} court.
    
    The federal court system is {separate} from the other branches of government.
    
    The federal courts are {hierarchical}, with the Supreme Court at the top and lower courts below.
    
    When a lower court makes a decision it can be {appealed} to a higher court that can affirm or overturn it.
    
    Federal courts can perform {judicial review} over laws passed by Congress and state legislatures and over executive actions.
    
    Federal judges are appointed for {life} and their salaries cannot be reduced to preserve independence from politics.
    
    Written laws made by legislatures are called {statutes}.
    
    In the U.S. and England we have {common law}, consisting of past court decisions that influence future legal decisions.
    
    A prior court decision sets a {precedent} that constrains future courts in the same jurisdiction.
    
    The set of cases a court is authorized to decide is its {jurisdiction}.
    
    {Trial courts} are also called courts of original jurisdiction; they hear evidence and determine what happened.
    
    Trial courts decide the {facts} of the case according to the rules of evidence, then apply the relevant law.
    
    In a {bench} trial, only a judge determines the facts and the law; there is no jury.
    
    More than 90% of cases never go to court; they get {settled} by lawyers out of court.
    
    {Appeals} courts have appellate jurisdiction and don't hear facts—they decide questions of law.
    
    To succeed on appeal you often need to show something was wrong with the {procedure} of your trial.
    
    Most common law is made by {appeals} courts, and their decisions are more important than trial court decisions.
    
    The two main types of law are {criminal} law and {civil} law; they can morph into public law.
    
    Criminal laws are almost always {statutes} written by legislatures; in most states they are called penal codes.
    
    In a criminal case the government is the {prosecution} and the accused is the {defendant}.
    
    Almost all criminal cases happen at the {state} level; federal crimes include tax evasion, mail fraud, and racketeering.
    
    In civil law the {plaintiff} claims the {defendant} has caused an injury that can be remedied; the defendant may have to pay damages.
    
    Cases about contracts, property, and personal injuries ({torts}) are examples of civil law.
    
    A case becomes {public} law when government powers or citizens' rights under the Constitution or federal law are involved.
    
    The fact that we have both state and federal statutory law is an example of {federalism} in action.
    
    # 19 Structure of the Courts
    
    The American court system is {hierarchical}, with the Supreme Court at the top and lower courts below.
    
    The trial courts have {original} jurisdiction; the vast majority of cases start out in {state} courts because there are 50 states, each with its own court system.
    
    Most disputes, criminal and civil, are settled {outside of court}; only a fraction ever get to court.
    
    On the federal side, the trial courts are the U.S. {district courts}; there are {94} of them with about 663 judges.
    
    In civil cases, the {plaintiff}—the person bringing the case—may have a choice of whether to bring the case in state or federal court.
    
    You can only start in the district courts if your case meets certain important {criteria}; almost all criminal cases start in state courts.
    
    If you have a reasonable claim that something was {procedurally} wrong with the case or the way the law was applied, you can bring an appeal.
    
    If you start in state courts you usually have more chances for appeal because most states have {two} levels of appellate courts, and the federal system has one.
    
    Appeals courts can {refuse} to hear appeals, and if they do, you're done; the loser can always try to appeal, even if that loser was the state that failed in prosecution.
    
    Federal appeals courts are called {circuit} courts, and there are {12} of them distributed regionally throughout the U.S.
    
    Judges in the 9th circuit, which includes California and Oregon, tend to be more {liberal} than judges in the 5th circuit.
    
    Federal appeals are usually heard by panels of {three} judges, while trials in the district court are before a single judge.
    
    There are four scenarios where the federal courts have {original} jurisdiction: federal law (e.g. a claim against Obamacare), treaties, the U.S. Constitution, and cases where the U.S. government is a party.
    
    The other type of case that can go in federal court involves more than one state where there's more than {70,000} dollars at issue.
    
    Federal judges are supposed to be more {impartial} than state judges when parties in dispute are in different states.
    
    Most of the time the Supreme Court has {appellate} jurisdiction; it is the final court of appeals.
    
    When the court hears a case it's called {judicial review}; the Supreme Court can also have original jurisdiction and act like a trial court.
    
    There is no constitutional requirement that Supreme Court justices be {lawyers}, though most are.
    
    The court has original jurisdiction in cases between the U.S. and a state, between two or more states, cases involving {foreign ministers} or ambassadors, and cases between citizens of different states or against a foreign country.
    
    The Supreme Court can exercise original jurisdiction over crimes committed on the {high seas}, including piracy.
    
    For the court to exercise appellate jurisdiction, the case must raise a {federal question}—e.g. due process, equal protection, or an important federal statute.
    
    The Supreme Court gets requests to review about {8,000} cases a year but hands down only about {80} decisions; there are only nine justices.
    
    The first decision rule is that there must be a {case or controversy}; you cannot request review of a law before it has gone into effect—there must be an actual injury first.
    
    The Supreme Court will not issue {advisory opinions}, speculating on whether a law might violate the Constitution.
    
    {Standing} means that parties must have a substantial stake in the outcome, which usually means an actual injury.
    
    Lack of standing is one reason the court refused cases about same-sex marriage brought by {opposite sex} married people.
    
    The court will refuse to hear cases that are {moot}, meaning the case no longer requires a resolution (e.g. one party is dead).
    
    The flipside of mootness is {ripeness}; if a potential injury has yet to occur, the case is not ripe.
    
    In {Bush v. Gore} the court needed a quick outcome so a new president could move into the White House.
    
    The {political question} doctrine means the court may let the executive or legislative branch handle certain issues and not get involved.
    
    When circuit courts reach different or conflicting conclusions on the same issue, it is called a {circuit split}, and the Court will usually hear the case to resolve the confusion.
    
    The Court will almost always hear a case where the {federal government} itself initiated the appeal.
    
    The Court will usually take a case with a clear constitutional question (e.g. freedom of speech or religion), though for a long time it didn't hear {gun control} cases and nowadays often doesn't take {obscenity} cases.
    
    # 20 Supreme Court
    
    To take a case to the Supreme Court you need a {case or controversy} that has already been heard and decided by a lower court and appealed.
    
    Except in rare situations of original jurisdiction, before a case gets to the Supreme Court you must have {exhausted} your appeals at lower levels of the state or federal system.
    
    If you've lost your previous appeals but think you have an issue worthy of the court's attention, you can petition for a {writ of certiorari}, which people call "the cert."
    
    Certiorari is a formal request that the Supreme Court hear your case, but petitioning for a writ is no {guarantee} of anything.
    
    The federal government's chief lawyer, the {solicitor general}, screens out many petitions because cases don't raise federal law questions or have already been decided.
    
    If your petition is granted it goes into the {cert pool}—the first round in which the justices decide which cases they will actually decide.
    
    The list of cases that will be decided is called the {discussion list}.
    
    For the Court to hear a case, called granting certiorari, {4} of the 9 justices must agree to hear it; this is the {rule of 4}.
    
    The discussion and decision about whether to grant certiorari happens at the {conference}.
    
    {Briefs} are written legal arguments from each side explaining why the law favors their position; they are not underwear.
    
    The party seeking to overturn the lower court decision is the {petitioner}; the party wanting the court to uphold it is the {respondent}.
    
    The petitioner also files a {reply} that attempts to rebut the respondent.
    
    Individuals or groups not party to the case but with an interest in the outcome can file {amicus curiae}, or friend of the court briefs.
    
    Amicus briefs can contain different legal, economic, or {historical} arguments that sometimes persuade justices and appear in their opinions; they are one way {interest groups} can influence the Supreme Court.
    
    After the briefs are filed, the court schedules {oral arguments}; each side gets {half an hour}, and most of that time is usually spent answering questions from the justices.
    
    In order for the court to render an official decision, {5} of the 9 justices—a majority—must agree on at least one legal argument that affirms or overturns the lower court's decision.
    
    Sending a case back down to the lower court for another decision is called a {remand}.
    
    The {chief justice} presides over the conference and assigns the task of writing the court's decision.
    
    The court's written decision is called the {majority opinion}; sometimes the court will issue a single opinion that is very strong.
    
    In {Brown v. Board of Education} the court issued a single opinion that was even stronger because it was {unanimous}.
    
    The decision to affirm or overturn the lower court's ruling is called the {holding}; the legal reasoning behind it is the {rationale}.
    
    If a justice agrees with the holding but for different legal reasons, they write a {concurring} opinion; the rationale in a concurrence is not binding on lower courts.
    
    Only the {holding} and {rationale} of the majority are binding on lower courts.
    
    The judges on the losing side can write a {dissenting} opinion; a dissent does not set precedent and has no force of law.
    
    In {Plessy v. Ferguson} the arguments in the dissent later formed the foundation for the majority opinion in {Brown v. Board of Education}, though it took about 50 years.
    
    Most certiorari petitions—usually about {8,000} each year—don't get granted; it takes 4 justices to agree to hear a case but {5} to render a majority opinion.
    
    Only the holding and rationale supported by at least 5 of the 9 justices become {binding precedent} for lower courts.
    
    # 21 Judicial Review
    
    {Judicial review} is the power of the judiciary to examine and invalidate actions by the legislative and executive branches; it is the main {check} the Court has on both branches.
    
    Judicial review applies to actions of both the {federal} and {state} governments; it is not the power to review lower court decisions—that is appellate jurisdiction.
    
    Most people think of judicial review as declaring laws {unconstitutional}; the Court can uphold or affirm the validity of laws or invalidate them.
    
    The Supreme Court does not invalidate congressional {statutes} often; historically it almost never happened before the twentieth century.
    
    If the Court frequently overruled Congress it would seem too {political} and people would stop trusting its judgment; the Court's power stems from its prestige and reputation for being impartial.
    
    The Court can overturn {state} actions, including laws passed by state legislatures and the activities of state executive bureaus, usually the police.
    
    The power to review and overturn state laws comes from the {Supremacy Clause} in the Constitution.
    
    Most of the time the Supreme Court extends civil rights it comes from a state action; a good example is {Brown v. Board of Education}, where the Court struck down separate accommodations in state public schools.
    
    The Court can review the actions of federal {bureaucratic} agencies; we usually defer to the bureaucrat's expertise if the action is consistent with the legislature's intent.
    
    The Court almost never strikes down Congressional {delegation} of power to the executive.
    
    The Court tends to defer to the President especially in the area of {national security}.
    
    In {U.S. v. Nixon} the Justices denied the President's claim of executive privilege and forced him to turn over his Watergate recordings.
    
    The Court placed limits on the President's authority to deny habeas corpus to suspected terrorists in {Rasul v. Bush}.
    
    The power of judicial review is {not} in the Constitution; it comes from the Court itself.
    
    The Supreme Court granted itself the power of judicial review in {Marbury v. Madison}; Chief Justice {John Marshall} wrote the decision.
    
    Marshall ruled that the Court could review and strike down executive actions pursuant to the {Judiciary Act of 1789}, and strike down part of that federal law.
    
    {Marbury} was appointed Justice of the Peace by President Adams; {James Madison}, Secretary of State, refused to give him his commission.
    
    Marbury sought a writ of {mandamus} to force Madison to give him his job; Marshall ruled that the law directing the Court to grant the writ was unconstitutional.
    
    By ruling against his own party (Marshall was a Federalist), Marshall made a decision favorable to {Thomas Jefferson}, thus likely to be supported.
    
    Marshall's ruling took the power of writs of mandamus away from the Court, making it look weaker, while giving the Court the power to declare {laws} unconstitutional.
    
    Supreme Court precedents are binding on future Supreme Courts because of {stare decisis}, Latin for "let the decision stand."
    
    Appellate decisions are like {common law} in that they are binding on future courts and constrain their decisions; they don't have to be grounded in a specific statute.
    
    In {Miranda v. Arizona} the Court threw out Miranda's conviction because he hadn't been told he had the right to remain silent; his confession got him convicted.
    
    The Court didn't rewrite Arizona's law but sent a signal to law enforcement that courts would throw out convictions of defendants who hadn't been informed of their {rights}; police procedures changed in every state.
    
    Some say judicial review is judges making law and thus an {anti-democratic} usurpation of the legislature's power.
    
    The executive and legislative branches also operate with many {implied} powers not explicitly granted in the Constitution.
    
    # 22 Judicial Decisions
    
    Justices are supposed to be {independent}, but they don't make decisions in a vacuum; they're influenced by factors other than the case in front of them.
    
    Justices might be influenced by {Congress}, because unless the case involves the Constitution directly, Congress can respond to a decision overturning a law by passing a new law.
    
    Once confirmed, the {President} has minimal effect on Supreme Court decisions, though he's somewhat influential on lower court justices who might want to be on the Supreme Court.
    
    Federal judges are more likely to make rulings that might get them considered for the Court, knowing the President gets to make the call on who becomes a justice with the help of the {Senate}.
    
    Much more influential on justices is {history}, which works in two ways: precedent and stare decisis constrain decisions, and justices know their decisions will be studied by historians and lawyers.
    
    Justices know that some decisions like {Dred Scott}, {Brown v. Board}, and {Roe v. Wade} can have an enormous impact on American history.
    
    Judges may behave {strategically} and consider how their decisions will be implemented by the executive branch or how one decision will lay the foundation for a change in a later decision.
    
    Judges are influenced by their political {ideology} (liberal or conservative) and possibly by their {party} affiliation (Democrat or Republican).
    
    It's pretty rare that a Democratic president selects a {Republican} judge for the Supreme Court, especially these days.
    
    Former Justice {David Souter} is an example of a judge appointed by a Republican who turned out to be much more to the liking of Democrats.
    
    Judges are influenced by their {judicial philosophy}; the two that matter most are judicial activism and judicial restraint.
    
    {Judicial activism} is the idea that the Court should act as an instrument of policy, more like the other two branches; activists look beyond the text of the Constitution to consider broader social implications.
    
    Activist judges are often accused by opponents of making {law} from the bench; activism is often associated with liberal justices but it's not that simple.
    
    {Judicial restraint} is the idea that judges should pay close attention to precedent and that any changes to the law should be incremental.
    
    Judicial restraint is sometimes confused with {originalism}, the idea that law should be interpreted in light of the Constitution as written in 1787—a "What Would James Madison Do?" orientation.
    
    Advocates of judicial restraint often rely on the Constitution's text, but it's {precedent} that restrains them more than the Constitution.
    
    The high tide of judicial activism occurred between the {1950s} and mid-70s when {Earl Warren} and Warren Burger were Chief Justices; the Court expanded civil rights, voting rights, privacy, and rights of the accused.
    
    From the 1980s through the early 2000s the Court led by {William Rehnquist} was known for judicial restraint, dialing back civil rights, affirmative action, and desegregation and devolving power back to the states.
    
    The {Citizens United} case broke with previous precedent and allowed much more campaign fundraising than prior decisions had—something political conservatives wanted.
    
    The Roberts Court invalidated parts of the {Voting Rights Act}, which had been passed in 1965 and renewed by Congress in 2010.
    
    One core tenet of judicial restraint is that courts are not supposed to overturn the decisions of a {democratically-elected} Congress to make policy unless Congress passed laws that are clearly unconstitutional.
    
    Justice {Breyer}, usually considered politically liberal and appointed by a Democrat, believes judicial change should be incremental and exercises judicial restraint.
    
    Judicial {philosophy} (activism vs. restraint) is not the same as political {ideology} (liberalism vs. conservatism); it's possible to be politically conservative and judicially activist, and vice versa.
    
    Despite what you may hear, all decisions are highly {political}; when you look at a Court decision, think about which factors went into it and how Congress and the Executive will react.
    
    # 23 Civil Rights and Civil Liberties
    
    {Civil liberties} are limitations placed on the government—things the government can't do that might interfere with your personal freedom.
    
    {Civil rights} are curbs on the power of majorities to make decisions that would benefit some at the expense of others; they are guarantees of equal citizenship.
    
    Civil rights mean that citizens are protected from {discrimination} by majorities; same-sex marriage is a civil rights issue because the majority of voters in some states denies something to a minority.
    
    {Substantive} liberties are limits on what the government can do; for example, Congress shall make no law establishing religion.
    
    {Procedural} liberties are limits on how the government can act; for example, the presumption that someone is innocent until proven guilty in criminal cases.
    
    In criminal cases, {juries} and judges have to act as though the accused is innocent until the prosecution convinces them otherwise.
    
    Civil liberties are contained in the {Bill of Rights}, the name we give to the first 10 amendments; the Constitution doesn't actually call it that.
    
    The {9th} amendment reminds us that the list of liberties in the other amendments isn't exhaustive; there might be other rights not specifically listed.
    
    The 5th amendment guarantees against {self-incrimination} but doesn't say by whom; the 8th prohibits cruel and unusual punishments but doesn't say who is forbidden.
    
    In {Barron v. Baltimore} (1833) the Court said the Bill of Rights applied only to the {federal} government, not to the states.
    
    Barron held that every American has dual citizenship—you are a citizen of the U.S. and of the {state} in which you reside; the Constitution only protected you from the federal government.
    
    After the Civil War the {13th}, {14th}, and {15th} amendments were added; of these the 14th is the most important.
    
    The 14th Amendment says no state shall deprive any person of life, liberty, or property without {due process} of law, nor deny any person the {equal protection} of the laws.
    
    The Supreme Court could have ruled that all rights in the Bill of Rights applied to the states, but instead they ruled that each right had to be {incorporated} against the states on a case-by-case basis.
    
    This is called {selective incorporation}; it supposedly reserves more power to the states but when people felt states violated their liberties they had to go to the Supreme Court.
    
    By now the Court has incorporated almost every {clause} in the Bill of Rights against the states.
    
    In {Gitlow v. New York} the Court ruled that the First Amendment protection of freedom of {speech} could not be violated by a state.
    
    In {Mapp v. Ohio} the Court ruled that states couldn't use evidence gathered from {warrantless} searches.
    
    In {Benton v. Maryland} the right against {double jeopardy}—being tried for the same crime twice—was incorporated against the states.
    
    The Bill of Rights was added to the Constitution in {1789}, but those limits did not apply to the states until the 14th Amendment and numerous court cases.
    
    Only after the {14th} Amendment was passed, following the Civil War, did the national government address the issue of states denying people's liberties.
    
    Protecting civil liberties requires {vigilant} citizens aware of ways government is overstepping; it's also vital that majorities pay attention to the civil {rights} of others.
    
    # 24 Freedom of Religion
    
    The First Amendment says Congress shall make no law respecting an {establishment} of religion or prohibiting the {free exercise} thereof.
    
    The establishment clause means the U.S. can't create an official state church like the Church of {England}.
    
    The First Amendment ensures the U.S. has no state-endorsed religion and doesn't write laws based on religious {edicts}; this clause also deals with religious monuments and school prayers.
    
    The free exercise clause means you can't be {prohibited} from being part of a certain religion, although not every religious practice is allowed.
    
    If your religion required human sacrifice, the government could prevent you from practicing that aspect but could not prevent you from {believing} it was necessary.
    
    The distinction between religious belief and religious practice was established in cases like {Church of Lukumi Babalu Aye v. Hialeah}.
    
    In {Lemon v. Kurtzman} (1971) the Supreme Court devised a three-prong test for laws touching religion; the case combined Rhode Island and Pennsylvania facts involving public money and parochial schools.
    
    Under the first prong the law must have a {secular legislative} purpose; educating children is a power reserved to the states and is generally a secular purpose.
