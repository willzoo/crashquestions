    Under the second prong the law's principal effect must neither {enhance} nor {inhibit} religion.
    
    The third prong requires that the law not create {excessive entanglement} between church and state; this is where both Rhode Island and Pennsylvania laws got into trouble.
    
    In Rhode Island the school buildings had religious imagery and two-thirds of the teachers were {nuns}; the Court ruled that inculcating religious doctrine is enhanced by the impressionable age of pupils.
    
    In Pennsylvania the Court ruled that to ensure teachers were NOT teaching religion the state would have to {monitor} them so closely it would create excessive entanglement.
    
    {Lemon v. Kurtzman} built on {Engel v. Vitale}, which ruled that prayer in public schools violated the Establishment Clause.
    
    Every few years a case comes involving prayer in school and they apply the {Lemon} test; for example a moment of silence statute—one purpose is to let students pray, which doesn't look secular.
    
    The word "{excessive}" in the entanglement prong is pretty subjective; almost any religious practice in school could be excessively entangling because the state would have to monitor it.
    
    Some school systems have tried {student-led} prayers because students aren't agents of the state, but then you have the issue of how much monitoring is needed.
    
    The Lemon test is a {framework} for analyzing situations where religion and the state might get mixed up; it leaves a lot of wiggle room and encourages future cases.
    
    Religious freedom is one of the less {controversial} protections in the First Amendment compared to free speech.
    
    # 25 Free Speech
    
    The primary reason we have freedom of speech is to allow for {public criticism} of the government; in countries without strong free speech protections that can land you in jail.
    
    The First Amendment protects you from the {government} doing things that try to deny your speech, but not from anyone else—your boss can fire you for what you say.
    
    If your boss is the government you might be able to claim a First Amendment right; if you work for a private company you have no First Amendment claim against them.
    
    The speech that gets the strongest protection is {political} speech; it's given preferred position, meaning any law limiting it is almost always struck down.
    
    In {Brandenburg v. Ohio} (1968) a Klan leader made an offensive and threatening speech; the Court ruled that because it was political it was protected no matter how outrageous.
    
    The First Amendment protects speech even if it advocates force or law violation, unless the advocacy is directed to {inciting} imminent action and is likely to produce it.
    
    You can advocate overthrowing the government unless what you say is likely to produce that thing {imminently}—very soon after you make the statement.
    
    {Brandenburg} limited the older standard from {Schenck v. United States} (1917); Schenck distributed pamphlets urging people to avoid the draft in World War I.
    
    Oliver Wendell Holmes wrote that when speech presents a {clear and present danger} the state can abridge it; he said the First Amendment doesn't protect shouting "fire" in a crowded theater.
    
    {Symbolic} speech can be protected by the First Amendment; it includes wearing armbands, carrying signs, or burning an American flag.
    
    A student who held up a "Bong hits 4 Jesus" banner at a school-sponsored function could be {suspended}; the school as government agent can restrict that.
    
    Even {hate} speech is protected; burning a cross on someone's lawn might be prosecuted as vandalism or trespassing but not as speech violation.
    
    Public universities that try to punish hate speech have seen their {discipline} codes struck down.
    
    Spending money on political campaigns has been determined to be {speech} protected by the First Amendment; donations are still treated differently for now.
    
    The only kind of speech not protected (besides incitement to imminent violence) is {fighting words}—words so insulting they're likely to result in a fight.
    
    In {Chaplinsky v. New Hampshire} the Court ruled that fighting words are not protected; the fighting words exception is almost {never} used.
    
    In {Pickering v. Board of Education} a public school teacher wrote a letter to the editor criticizing the school board; he was fired but won because his employer was the {government}.
    
    For most of us, complaining about our employer's policies may get us fired and we can't claim First Amendment rights unless we are {government} employees.
    
    # 26 Free Press
    
    The First Amendment prevents the government from {censoring} the press—either preventing publication in the first place or punishing a news agency after they publish.
    
    Censorship of the press before a story is published is called {prior restraint}; the Supreme Court ruled it was not allowed in {Near v. Minnesota}.
    
    In Near v. Minnesota, The Saturday Press was going to publish a story about Minneapolis and Jewish gangsters; city officials obtained an {injunction} to stop publication.
    
    The Supreme Court agreed that no government was allowed to censor the press because a {free press} is essential for the political system to work.
    
    The Court relied on {Blackstone}, who said the liberty of the press consists in laying no previous restraints upon publications, not freedom from censure for criminal matter when published.
    
    The Court also relied on {James Madison}, who said the press should be exempt from previous restraint by the executive and from {legislative} restraint.
    
    Citizens need a free press to {criticize} the government and expose government wrongdoing; otherwise the government can get away with things we don't want.
    
    If a newspaper prints something untrue about a government official, the person can sue for {libel} and get monetary damages if they prove their case.
    
    Libel suits can cause a {chilling effect}—when a newspaper is so afraid of a suit it doesn't publish, it effectively censors itself.
    
    In {New York Times v. Sullivan} (1964) the Court ruled that the standard for libel of a public figure is {actual malice}.
    
    Actual malice means the publisher knew the statement was {false} and acted with reckless disregard for the truth; it's almost impossible to prove so public figures almost never win libel cases.
    
    One exception to press freedom is {national security}; the government can censor the press before they print detailed descriptions of troop movements during a war.
    
    In {New York Times v. United States} the issue was whether the Times could publish the {Pentagon Papers}—secret documents stolen by Daniel Ellsberg showing the government's reasoning on Vietnam was questionable.
    
    The Court ruled against prior restraint in the Pentagon Papers case, strengthening the First Amendment and slapping down the executive's claim of {state secrets} privilege.
    
    American democracy relies on citizens having enough {information} to make good decisions and hold elected officials accountable.
    
    # 27 Search and Seizure
    
    The question of when and how the police can conduct a search falls under {criminal procedure}; the courts look at how the police are acting and the protections are primarily {procedural}.
    
    There is no unlimited or substantive right to have the police not search you; the Fourth Amendment protects against {unreasonable} searches and seizures.
    
    The Fourth Amendment says no warrants shall issue but upon {probable cause}, supported by oath or affirmation, particularly describing the place to be searched and persons or things to be seized.
    
    A search warrant is a piece of paper issued by a {judge} authorizing law enforcement to search something—your house, car, person, or effects.
    
    Probable cause is more than just a {suspicion} or anonymous tip; warrants are supposed to be specific about what police are searching for and where.
    
    If a warrant says police can search your garage for a stolen car they can't look in your kitchen drawers because the warrant is {specific} and you can't hide a car in a drawer.
    
    Despite the Fourth Amendment seeming to require a warrant always, the courts have ruled that a {reasonable} search does not always require a warrant.
    
    If the police have probable cause they don't always need to go to a judge to search you; what makes a search {reasonable} is something the courts have wrestled with.
    
    If police stop you for speeding and search your car and find a dead body in the trunk, the courts have ruled that is {reasonable}.
    
    If police catch a suspect running from a bank robbery they don't need an {arrest} warrant to take him into custody and have probable cause to search him.
    
    In {Mapp v. Ohio} (1961) police used a fake warrant to search Dollree Mapp's home; they found pornography (illegal then) but had been looking for explosives and gambling equipment.
    
    The Court ruled that evidence seized through an {illegal} search cannot be used against a defendant in trial; this is the {exclusionary} rule.
    
    Unlawfully obtained evidence is excluded from trial; this is sometimes called the "{Fruit of the Poisoned Tree}."
    
    The courts have been very {lenient} when police search your car; often a moving violation like speeding can be probable cause.
    
    The police can usually search your car and you if they pull you over; random {drunk driving} checkpoints have been ruled okay if they don't disproportionately target a specific race.
    
    {Students} don't have the same protections; school officials can search lockers and bookbags because the state's interest in a safe, drug-free environment trumps their privacy interest.
    
    Drug tests for student {athletes} have been ruled fine; {strip} searches have been ruled not okay.
    
    Like all constitutional protections of civil liberties, the Fourth Amendment only applies to {government} agents; you have no protection against your parents searching your room.
    
    The Amendment includes a {reasonableness} standard; what is reasonable and when warrants are necessary has been and continues to be determined by the courts.
    
    # 28 Due Process
    
    On the most basic level, due process is what it means to have a {fair trial}, but it's more than what goes on in the courtroom.
    
    Due process is mostly concerned with {criminal} procedure because it's always the government that brings criminal charges.
    
    The 14th Amendment says no state shall deprive any person of life, liberty, or property without {due process} of law; this allowed the Court to incorporate rights against the states.
    
    {Substantive} due process is a blanket prohibition on government infringing on fundamental liberties; courts generally don't like to uphold claims based on it because they'd have to define what it means.
    
    {Procedural} due process means the court looks at whether the government acted properly in applying its power; if the government followed procedural rules, they didn't violate your rights.
    
    If you are charged with a crime you are entitled to a {grand jury} that must decide there is enough evidence to bring you to trial; if so they issue an {indictment}.
    
    Soldiers and sailors who commit crimes get tried in {military} courts.
    
    The Fifth Amendment protects against {double jeopardy}—the state trying you for the same crime twice after losing; the government only gets one bite at the apple.
    
    The double jeopardy clause only applies to {convictions}; if there's a mistrial and you're neither convicted nor acquitted, the state can try you again.
    
    The protection against being compelled to be a witness against yourself is {self-incrimination}; we say someone "pleads the {Fifth}."
    
    "You have the right to remain silent" and "anything you say may be used against you" come from {Miranda v. Arizona} (1966).
    
    The "just compensation" clause means if the state takes your property (e.g. for a freeway) they have to {pay} you; this is the basis of {eminent domain}.
    
    The Sixth Amendment guarantees a {speedy} and {public} trial; most states allow holding you about 45 days before trial unless you waive the right.
    
    You have the right to a jury of your {peers} and to be tried where you committed the crime; you have the right to know what you're charged with and to {cross-examine} witnesses.
    
    You have the right to an {attorney}; in {Gideon v. Wainwright} the Court said this applies in felony cases.
    
    Miranda was arrested for kidnapping and rape; police questioned him for two hours and he {confessed} without being told his rights; the confession was the main evidence at trial.
    
    The Court ruled that you don't really have due process protections unless you {know} about them; police must tell you your right to remain silent and your right to an attorney.
    
    If you're arrested the very next thing you should say is you'd like to speak with a {lawyer} and don't say anything else until you have one.
    
    Sometimes guilty people go free because police or courts don't follow the rules, but the alternative—a government that can lock you up whenever it wants—makes procedural protections vital.
    
    # 29 Equal Protection
    
    Civil rights protections grow out of the "{equal protection}" clause of the 14th Amendment: no state shall deny to any person within its jurisdiction the equal protection of the laws.
    
    Civil rights are primarily about the ways citizens, often through laws, can treat other groups {differently}, which usually means unfairly.
    
    Initially the Supreme Court interpreted the clause to apply only to {state} government, not to private discrimination.
    
    In the Civil Rights Cases the Court said the law could not have been intended to abolish distinctions based on {color} or to enforce social as distinguished from political equality.
    
    The Court confirmed that as long as the state provided equal accommodations for different races, {segregation} was fine—the "separate but equal" doctrine from {Plessy v. Ferguson}.
    
    When state law mentions a {protected class} the Supreme Court will almost automatically become suspicious.
    
    Protected classes are "discrete and {insular} minorities" such as religious, national, or racial minorities; the Court defined this in an important {footnote}.
    
    Minorities are at a disadvantage in the democratic process—their numbers are too small to pass laws favoring them and majorities can pass laws that {disadvantage} them.
    
    The highest level of scrutiny is {strict scrutiny}; the government has a heavy burden to prove the law is allowable and the action is probably going to be deemed unconstitutional.
    
    The courts use a five-step process: protected liberty at stake, whether it's {fundamental}, undue burden, {compelling} government interest, and {least restrictive} means.
    
    If the Court finds there's a less burdensome way the government could accomplish its goal, the law is {struck down}.
    
    When the government isn't dealing with a protected class the Court usually applies {rational basis} review—the lowest level; if the government has a rational basis, courts say it's OK.
    
    Between strict scrutiny and rational basis is {intermediate} scrutiny; it's harder than rational basis but the government doesn't usually lose like with strict scrutiny.
    
    In {Brown v. Board of Education} Topeka had separate schools for black and white students; Linda Brown's parents wanted her in the white school because it was closer and better.
    
    The Court's reasoning in Brown wasn't legal or historical but {sociological}—that separate facilities are inherently unequal because they make the minority feel inferior.
    
    Brown didn't immediately end segregated schools; many states engaged in "{massive resistance}" to prevent integration.
    
    Brown showed the federal government could intervene in something as local as {public education} when racial discrimination was involved and that states couldn't use {race} as a criterion.
    
    Brown was the legal basis of the American civil rights movement and the federal civil rights legislation of the {1960s}.
    
    What constitutes civil rights changes over time; in 2015 same-sex marriage was a defining civil rights issue when 30 years earlier it was hardly mentioned.
    
    # 30 Sex Discrimination
    
    The middle level of Supreme Court review is called {intermediate} scrutiny; it's more stringent than rational basis but the government doesn't usually lose like with strict scrutiny.
    
    Intermediate scrutiny applies mainly in cases involving {women}; racial, religious, and ethnic groups are almost always minorities but women statistically are not.
    
    For the courts, {majority} groups have a good chance of winning in the legislative process and don't need the same level of judicial protection as minorities.
    
    Women have historically been given {inferior} status; a law aimed at women will cause the Court to look more carefully than when women aren't mentioned but less than for racial or religious minorities.
    
    Most rules against discrimination come from the federal {Civil Rights Act of 1964} and state anti-discrimination statutes.
    
    The Civil Rights Act outlawed discrimination based on race, religion, ethnicity, or {sex} in public accommodations, transportation, and most importantly {employment}.
    
    The key section for employment is {Title VII}; it's unlawful to fail or refuse to hire, discharge, or discriminate in compensation, terms, or conditions because of race, color, religion, sex, or national origin.
    
    To bring a claim you must be in a {protected class} and show discrimination was based on race, color, religion, sex, or national origin.
    
    When no member of a minority gets promoted or they're disproportionately fired—e.g. 9 of 10 black workers laid off when 10% are cut—that's {disparate impact}.
    
    If you show disparate impact the {burden of proof} shifts to your employer, who must prove his actions were caused by {business necessity}.
    
    If the employer shows business necessity the burden shifts back to the plaintiff to show the employer's reasons are {pretext} and the action was really due to the protected group.
    
    Women are also protected against {sexual harassment} in the workplace; harassment is discrimination as negative treatment based on membership in a group.
    
    The two types of sexual harassment are {quid pro quo} (benefits in exchange for sexual favors) and {hostile work environment}.
    
    {Quid pro quo} is when an employer withholds promotions in exchange for sexual favors; hostile work environment can result from other employees but the {employer} is responsible for ensuring a friendly workplace.
    
    In {Burlington v. Ellerth} Kim Ellerth was subject to unwanted advances; a supervisor said "are you wearing shorter skirts yet" and she won her suit.
    
    Discrimination claims are {hard} to prove; much of the evidence may be statistical and difficult to get.
    
    # 31 Discrimination
    
    The 14th Amendment applies mainly to discrete and insular minorities; various {ethnic} groups are protected because you can't control who your parents are or what country they come from.
    
    In 1882 Congress created the {Chinese Exclusion Act}, one of the first federal laws aimed specifically at immigrants, effectively closing the door on immigrants from China.
    
    Later immigration {quotas} had the effect of discriminating against Southern and Eastern Europeans.
    
    In {Wong Kim Ark v. United States} the Court ruled that American citizenship is based on being {born} here, not the citizenship of one's parents.
    
    People who don't speak English as their primary language can face discrimination, especially in the political process; that's why {voting guides} appear in multiple languages in many states.
    
    In {Lau v. Nichols} the Court established that school districts must provide education for students whose {English} is limited; they can't just teach in English and disenfranchise those kids.
    
    People who immigrate following rules are generally entitled to the same rights as citizens except they cannot {vote} unless they become citizens.
    
    Those who immigrated without following the rules do not have nearly the same protections; they're usually eligible for {medical} and {educational} services but not other social services.
    
    California's {Proposition 187} attempted to take away social services (except emergency medical care) for those who emigrated unlawfully; most provisions were struck down.
    
    The 1986 Immigration Restriction and Control Act made employers responsible for background checks; rather than risk fines employers discriminated against all {immigrants}.
    
    {Native Americans} are the only group mentioned by name in the Constitution; originally they were considered citizens of their own sovereign nations, not the U.S.
    
    Since {1924} Native Americans have been granted citizen's rights and full protection under the 14th Amendment; tribes get special consideration where they are sovereign (e.g. {casinos}).
    
    Congress passed the {Americans with Disabilities Act} in 1990, doing for people with disabilities what the Civil Rights Act did for other minority groups.
    
    About {35}% of people with disabilities are employed versus 72% of people without; employers do discriminate against them.
    
    In {Romer v. Evans} the Court ruled states couldn't prohibit local governments from passing ordinances that prevent discrimination against {LGBT} people.
    
    In {Lawrence v. Texas} the Court ruled state morality laws applied against LGBT people but not straight people violated {equal protection}; everyone has the same right to privacy in sexual relations.
    
    In {Obergefell v. Hodges} the Court decided state bans on {same-sex marriage} were unconstitutional, making same-sex marriage legal in all 50 states.
    
    Civil rights protections have been extended to people with disabilities, LGBT people, ethnic groups, and women; they have been historically discriminated against and are numerical {minorities} (except women).
    
    # 32 Affirmative Action
    
    {Affirmative action} is a government or private program designed to redress historic injustices by making special efforts to provide members of discriminated-against groups with access to education and employment.
    
    The key aspect of affirmative action is special {access} to opportunities, usually in education and employment, for groups that have been discriminated against.
    
    Americans generally favor {equality of opportunity} but don't like government promoting equality of {outcomes} by redistributing wealth.
    
    Legal types use the metaphor of a {thumb on the scale} for the added benefits affirmative action provides; it could also be seen as a head start in a foot race.
    
    Affirmative action started with {LBJ} ordering government agencies to pursue policies that increase employment of minorities in their ranks and in soliciting contracts.
    
    In {Regents of the University of California v. Bakke} (1978) the Court ruled on racial set-asides or {quotas} in admissions at UC Davis Medical School; 16 of 100 slots were set aside for minorities.
    
    Bakke claimed less qualified people got in and he didn't because he was {white}; the Court ruled racial quotas were not allowed but affirmative action was allowed if it served a {compelling} government interest and was {narrowly tailored}.
    
    The Court rejected righting historical wrongs as a compelling interest but said {diversity} in university admissions was—diversity benefits minority and majority groups.
    
    Because they apply {strict scrutiny}, most affirmative action claims are struck down; this was clarified in {Adarand Constructors v. Peña} (1995) regarding racial preferences in government subcontracting.
    
    In {Gratz v. Bollinger} (2003) the Court ruled Michigan's undergraduate policy awarding extra {points} to racial minorities was unconstitutional—not narrowly tailored.
    
    In {Grutter v. Bollinger} (2003) the Court ruled Michigan's law school admissions policy was narrowly tailored to promote diversity but said in {25} years such a program might not be necessary.
    
    Universities can take {race} into account to create a diverse learning environment; if the policy looks like a quota the Court will strike it down.
    
    In 1996 Californians passed {Proposition 209}, the California Civil Rights Initiative, which outlawed affirmative action in public employment, contracting, and education.
    
    After Prop 209 the graduation rate among African Americans at some UC schools went {up} but enrollment rates declined and didn't return to 1996 levels until 2010.
    
    The courts have ruled that correcting historical injustices of slavery and {Jim Crow} is not a compelling enough interest to justify affirmative action; for many people it still is.
    
    # 33 Public Opinion
    
    "Government" describes the what, who, and how of policies; "{politics}" describes the why.
    
    Public opinion usefully refers to how a nation's population collectively views vital {policy} issues and evaluates political leaders.
    
    Public opinion matters especially because America is a {democracy}—government of the people, by the people, for the people.
    
    The framers were skeptical of the average American's ability to understand policy so they gave Americans direct influence over only the {House of Representatives}.
    
    Many say public issues are complicated and most people are uninterested or confused; staying less informed can be "{rational ignorance}" given the high cost of being informed.
    
    "The American Voter" (1960) showed how little most Americans knew about politics and suggested "most people don't have {real opinions} at all."
    
    In 1960, 47% couldn't name their House member; in 2010 it was {59}%—we have more information today but people aren't more informed.
    
    Benjamin Page and Robert Shapiro in "The Rational Public" argued that if you {aggregate} opinions of large numbers of Americans they are coherent, stable, and reflect reasonable judgements.
    
    {Condorcet's Jury Theorem} showed that while one juror is barely better than a coin flip, a larger group would produce a majority more likely to get the case right.
    
    James Surowiecki in "The Wisdom of Crowds" argued that a larger group taken together adds up to a {rational} public.
    
    For public opinion to influence government we need: people to know what they want, people to {communicate} it to officials, and government to respond.
    
    The public's desires often consist of {generalities} that are difficult to turn into actual policies; after 2008 there was anger at Wall Street but no consensus on what to do.
    
    Politicians often claim winning an election gives them a "{mandate} to govern" but Obamacare's unpopularity suggests election wins don't translate into solid support for policies.
    
    National campaigns spend around {1 billion} a year on polling but politicians don't always do what polling suggests; polls are used to {craft} messages acceptable to the public.
    
    For reliable polls the magic number of respondents is between {1,000} and 1,500; smaller samples may suffer from {sampling error}.
    
    You can deduce sample size from {margin of error}; for national polls it's often plus or minus three points.
    
    {Selection bias} occurs when the people polled are not representative—e.g. the 1936 Literary Digest poll predicted Landon would beat FDR because readership was wealthy and Republican.
    
    Polls relying on landline phones tend to undercount {younger} people who have only cell phones; {online} polls have selection bias because respondents aren't randomly selected.
    
    When the poll was taken matters; polls taken immediately after an election ({exit} polls) can be unreliable.
    
    {Ambiguous} or poorly worded questions can skew polls; the way questions are {framed} can change results—e.g. "promote free trade" vs. "destroy American jobs."
    
    # 34 Shaping Public Opinion
    
    Three main influences on political opinions are the {government}, private groups (interest groups), and the {media}.
    
    The biggest thing government can do to shape public opinion is to {do things}—raising taxes, invading countries; government inactivity (Congress passing fewer bills) has also affected approval ratings.
    
    The government shapes opinion through {public relations} and manipulating the news cycle; the President can go on television whenever he wants.
    
    The idea of the President at the center of news started with {Theodore Roosevelt} who saw the presidency as a "bully pulpit."
    
    {Franklin Roosevelt} began speaking directly to Americans with his "fireside chats"—direct appeals to support his policies.
    
    President Clinton had a "{war room}" to coordinate P.R.; President Bush tried {video news releases}—P.R. pieces that looked like news stories.
    
    In the 1960s and 1970s the {Vietnam} War and {Watergate} put a massive dent in trust in government.
    
    Public opinion is highly reactive to current events especially the {economy}; approval ratings have been low after the 2008 financial crisis.
    
    {Interest groups} like the NRA can mount advertising campaigns for or against laws if they have the money; the Internet has lowered the cost of P.R.
    
    The "{Harry and Louise}" ad campaign (1993–94) by the Health Insurance Association cost 14–20 million dollars and helped move opinion against {Clinton}'s health care proposals.
    
    {Think tanks} like the Heritage Foundation and American Enterprise Institute (right) and Brookings (left) produce research to change people's minds.
    
    The {media} tends to be the most powerful force shaping public opinion because it's everywhere and is the lowest-cost way to get information.
    
    The main way media shapes opinion is by choosing what stories to {cover} and not cover; it's hard to have an opinion on a topic you know nothing about.
    
    {Priming} is when the media prepares the public to take a particular view through the amount of coverage—e.g. focus on crime makes crime a greater public concern.
    
    {Framing} is the way media outlets choose to interpret an event—e.g. Obamacare launch: some focused on sign-up numbers, some on healthcare.gov failures.
    
    # 35 Political Ideology
    
    The process by which individuals establish their political ideologies is called {political socialization}; people identify as liberal, conservative, libertarian, socialist, etc.
    
    American {conservatives} believe a large government threatens individual liberty and prefer the national government to be as small as possible; they favor states and localities.
    
    Conservatives believe in the {free market} and that it provides the greatest economic opportunity; they usually support strong {defense} but want to cut other discretionary spending.
    
    Conservatives favor traditional religious and patriotic values (e.g. against flag burning, for prayer in school); many are against {abortion}; they value {liberty} above other values.
    
    {Libertarians} don't see any role for government in people's personal lives and often support things like marijuana legalization that traditional conservatives do not.
    
    American liberals are sometimes called {New Deal} Liberals; they believe government can help solve problems and a bigger government can solve bigger problems.
    
    Liberals support government {intervention} in the economy—regulations and higher taxes—especially to benefit marginalized groups like minorities, women, and the poor.
    
    Liberals favor a {progressive} tax system with higher taxes on the wealthy; they want to cut the {defense} budget and spend more on social programs.
    
    If conservatives value liberty, liberals cherish {equality} as their primary political virtue and see government as necessary in promoting it.
    
    The first and most important source of our politics is {family}; liberal parents tend to breed liberal children and conservative parents create conservatives.
    
    The second major influence is {social groups}—race, gender, religion, ethnicity; African Americans and Jewish people tend to be liberal; white Catholics tend to be conservative.
    
    {Latinos} are an interesting case—many identify as Catholic but tend to be more liberal politically; economic self-interest is one explanation (disproportionately poor, receive government benefits).
    
    The {gender gap} refers to women tending to be more liberal than men, especially on national defense (favor spending reductions).
    
    The third agent of political socialization is {education}—primary and secondary school; students learn values like liberty and equality; many states require {civics} courses.
    
    Conservatives think schools and textbooks skew {liberal}; teachers' union membership correlates with liberal viewpoint.
    
    Higher education correlates with more liberal views on women's rights or abortion but more {conservative} views on national health insurance or affirmative action.
    
    The fourth agent is {political conditions} one lives through—e.g. Great Depression and FDR made people pro-government; Reagan era made people conservative.
    
    # 36 Election Basics
    
    America is too big and complex for public referendums on every issue so we choose {representatives}—we vote for people, not policies.
    
    {Elections} help solve "adverse selection"—when we make a choice without all the information we need; competition creates incentives for candidates to provide accurate information.
    
    Elections make candidates {accountable} by giving voters a chance to get rid of bad actors; this only works when elections are competitive.
    
    The Constitution sets few guidelines; most important rules for how elections are carried out come from {state} laws, legal decisions, and local practices.
    
    Article I Section 4 says the times, places, and manner of holding elections for Senators and Representatives shall be prescribed by each {state} legislature; Congress may alter such regulations.
    
    The {Seventeenth} Amendment allowed direct election of Senators; the {Twelfth} Amendment fixed the electoral process so President and Vice President come from the same party.
    
    The {Twenty-Fourth} Amendment outlawed poll taxes; the {Twenty-Sixth} lowered the voting age from 21 to 18.
    
    The {Voting Rights Act of 1965} set up systems to increase voter participation by minority groups; Congress set up the {Federal Election Commission}.
    
    State laws define how candidates are {nominated} and get on the ballot, registration requirements, and polling place location and hours; states decide boundaries of Congressional {districts}.
    
    As a rule the federal government is more likely to pass laws that {expand} voting and states are the ones that {restrict} it (e.g. felony disenfranchisement).
    
    In most states we follow the {plurality} rule: the candidate with the most votes wins; the number does not have to be a majority.
    
    Under plurality rule a candidate can win with 30% while 70% voted for someone else; some states use a {run-off} if no one gets 50% plus 1.
    
    Forty-eight of fifty states use "{winner take all}" for electoral votes—the winner gets 100% of the state's electoral votes.
    
    Plurality rule ensures we get a definite winner and pretty much ensures we will only have {two} viable political parties.
    
    {Duverger's Law} explains that plurality rules create two-party systems; third parties take votes from the centrist party and throw the election to the other side.
    
    # 37 Gerrymandering
    
    {Gerrymandering} is the process of drawing election districts to shape electoral outcomes; it's named after {Elbridge Gerry} and a 19th-century political cartoon of a Massachusetts district that looked like a reptile (or dragon).
    
    Congressional {apportionment}—how many representatives each state gets—is based on population and changes every 10 years; we have a {census} every 10 years partly to know how many people are in each state.
    
    California has the most representatives ({53}); the least populous states (Alaska, Delaware, the Dakotas, Vermont, Wyoming, Montana) have only one; in those states there's only one {election district}—the geographic area represented by a congressman—so elections are effectively {at large}.
    
    Like a state's choice for senator, representatives are supposed to represent only a part of the state; the {Electoral College} is also a type of at-large election.
    
    States with multiple reps are divided into {single member} districts—each district chooses one representative.
    
    Districts are required to be equal (or almost equal) in {population}; populations are not evenly distributed across most states; the notion of equal population is the essence of {one person, one vote}.
    
    The one person, one vote principle was cast into law by the 1962 Supreme Court decision in {Baker v. Carr}; a person's vote counts equally no matter where they live, at least for the House.
    
    In the Senate it doesn't work out—in 2014 two senators represented {897,934} Delawareans and the same number represented approximately {38} million Californians.
    
    In the House each representative is responsible for about {seven to eight hundred thousand} people.
    
    One problem with single member districts is they can make it easier to {cut} minority groups out of the political landscape; if only 15% of a state are minorities it's harder for them to elect one of their own unless that person appeals to many non-minority voters.
    
    Congress and the Supreme Court have tried to remedy this by mandating {majority-minority} districts—districts where the majority of voters are members of a minority group; this is like affirmative action in voting and is disputed.
    
    States draw districts to {capture} certain population characteristics so one party has a greater chance of winning; the Illinois 4th carves up Chicago to capture a certain population; districts are often drawn so a significant majority of one party virtually ensures only a Democrat or Republican wins.
    
    Districts must be roughly equal in population and {contiguous}—they can't be completely divided by other districts; the thin strip along the interstate in the Illinois 4th exists to satisfy contiguity; this leads to weird configurations.
    
    Districts are drawn by {state legislatures} (or people at their behest); if one party has a majority they usually draw districts so their party has a better chance of winning; that's why {state legislature} elections matter so much in census years—whoever wins gets to redraw.
    
    There's no rule that states can't redraw whenever they want; {Texas} tried in 2003 (not a census year), prompting its Democrats to run away to Oklahoma; a state can hand the task to a less biased {expert} or group.
    
    Imagine a state 60% Republican and 40% Democrat with 5 districts: you could draw 3 R and 2 D (accurate), or 3 D and 2 R (inaccurate), or {5} R and zero D—gerrymandering can produce districts that don't reflect the state's political makeup.
    
    A counterargument: it's not state legislatures alone but that {Democratic} voters tend to cluster in cities where they outnumber Republicans; in {Ohio}, Democrats and Republicans may be even but Democrats concentrate in urban areas (Cleveland, Columbus) so most districts are won by Republicans.
    
    {Packing} is putting as many of the opposing party's voters as possible into one district so they waste votes; {cracking} is spreading them across many districts so they can't form a majority anywhere.
    
    Gerrymandering is easy to criticize because the visual results are {striking} and the numbers can look unfair; there's more data every election to understand it.
    
    # 38 How Voters Decide
    
    How voters decide results from many factors, only some conscious; the main way we know what caused a vote is to ask them, and humans are notoriously {unreliable} about their own motivations.
    
    The three main factors that influence how a person will vote are {party loyalty}, the {issues} involved, and {characteristics} of the candidates.
    
    {Party loyalty} is supposedly the single largest predictor of how a person will vote—usually in the range of 90%.
    
    Many voters identify as Democrat or Republican; a large percentage call themselves {independents}; parties are becoming more opposed—"{increasing polarization}."
    
    One piece of evidence for polarization: more Americans say they'd be {disappointed} if their child married someone from the opposing political party.
    
    People identify with a party because of {psychological} attachment (often from youth), because the party's {ideals} match their ideology, or from past experience with leaders.
    
    Your {parents} can have a powerful effect on whether you identify as Democrat or Republican, although some adopt a party in {rebellion} against their parents.
    
    People who grew up during the {Great Depression} and formed a positive view of FDR tended to become and stay Democrat; {Ronald Reagan} in the 1980s appealed to voters across party lines.
    
    The second factor is {candidate characteristics}—race, ethnicity, religion, gender; uninformed voters may rely on {stereotypes}, especially on ethnicity or religion.
    
    {Geography}—the region the candidate is from—sometimes matters (e.g. Biden and Delaware, Amtrak); sometimes it doesn't (e.g. Hillary Clinton and New York Senate—her gender and {star power} overcame "carpet bagger" complaints).
    
    The assumption that voters choose candidates similar in {social class} is questionable—many congressmen are {millionaires} and most have college degrees; only about {30}% of Americans have graduated from college.
    
    Voters are influenced by a candidate's {personality}—a reputation for honesty, energy, and decisiveness.
    
    The third factor is where candidates stand on {issues}; we might hope it's the top priority but it's pretty far down the list.
    
    {Retrospective} voting is choosing based on a candidate's past performance; {prospective} voting is based on imagined future performance; both add {information} costs for voters.
    
    Finding out how a candidate has performed takes time and research; imagining what they'll do (e.g. from debates) may not match what they actually do.
    
    {Spatial} issues are those with a range of options on a spectrum (e.g. minimum wage, taxes, abortion); {valence} issues are those where all voters prefer a higher value (e.g. government transparency).
    
    Other factors and interactions matter; the {Bradley} Effect refers to Tom Bradley (1982 California governor race)—he led in polls but lost; white voters may have told pollsters they'd vote for him when they weren't; {race} may have mattered more than party.
    
    Which factor best predicts outcomes? {Party loyalty} is probably the best bet; so-called {Reagan Democrats} show that party loyalty matters less when a candidate is charismatic or issues line up in their favor.
    
    The more {informed} the electorate is, the more heavily issues and candidate characteristics matter; since Americans are generally not well-informed, {party affiliation} looms particularly large in American campaigns.
    
    # 39 Political Campaigns
    
    We have political campaigns to provide voters with {information} they need to choose a candidate to represent them.
    
    A campaign is an organized {drive} by a candidate to get elected; it also refers to the organization (e.g. Obama campaign, Romney campaign)—staffers, volunteers, activities.
    
    Most campaigns are {temporary} but both parties have permanent professional organizations: the {DNC} and {RNC} (national committees) coordinate national campaigns.
    
    Each house of Congress has Republican and Democratic {campaign committees} headed by sitting members; because they give money to candidates their leaders are very popular.
    
    Campaigns communicate through the media, organized events ({stump} speeches), TV, debates, town meetings, photo opportunities, direct mail, press releases, and {advertisements}.
    
    Candidates now use {email}, {Twitter}, Facebook, and YouTube ads; raising money is also a way to present information because solicitations usually come with a policy piece.
    
    Campaigns are expensive because they're {huge} (presidential campaigns need to reach 220 million people), {long} (years before the election), and we expect them to be {personal} (Iowa, New Hampshire).
    
    In 2008 both presidential candidates together spent {3} billion dollars; in 2012 each spent about a billion and outside groups spent a further {4} billion.
    
    Congressional races in 2008 combined cost about {1} billion dollars.
    
    Campaign finance rules were set up after 1970; the {Federal Election Campaign Act} of 1971 was the first law limiting campaign spending and donations.
    
    The {McCain-Feingold} Act (2002) further refined the rules; {Buckley v. Valeo} was until recently the most important case on campaign finance.
    
    Campaign contributions could sway votes or at least give the {appearance} of impropriety when a congressman who receives millions from an industry then works to weaken regulations on it.
    
    # 40 Political Parties
    
    A political party is a team of politicians, activists, and voters whose goal is to {win control} of government; above everything else parties exist to win {elections}.
    
    Parties don't mainly focus on influencing policies; influencing elected officials is mainly the job of {interest groups}; parties and interest groups are not the same.
    
    First reason for parties: they facilitate {collective action} in the electoral process—parties make it easier for voters to form groups that vote in certain ways.
    
    Second reason: parties facilitate {policy making}—membership allows politicians to work together; Democrats form alliances with Democrats; party affiliation helps legislators from different places cooperate.
    
    Third reason: parties deal with politicians' {ambition}—they provide a structure or career ladder so politicians aren't always acting in self-interest; discipline prevents too many from the same party competing.
    
    Five main functions of parties: 1) {Recruit} candidates; 2) {Nominate} candidates; 3) Get out the vote; 4) Facilitate electoral choice; 5) Influence national government.
    
    To be a good candidate you generally need an unblemished record (or good at apologies) and the ability to {raise money}; parties sift through people who want to run and pick those with the best chance of winning.
    
    {Nomination} is the process through which a potential candidate is chosen to represent a party; we mostly talk about it for the {presidency} because that's the only office with a formal nomination process.
    
    Presidential candidates were once nominated at {conventions} or caucuses; now they're nominated during the {primaries} and conventions are largely ceremonial.
    
    {Primary} elections pit Democrat against Democrat and Republican against Republican; {closed} primaries mean only registered party members can vote; {open} primaries let any party member vote (allowing mischief like voting for the weak opponent).
    
    The winner of a primary is assigned {delegates}—non-elected party members who nominate the candidate at the convention; delegates are usually pledged to the primary winner; {majority} rules in nominating.
    
    Only about {25}% of those eligible to vote in primary elections actually do; states like New Hampshire try to have their primaries early to get attention.
    
    # 41 Party Systems
    
    Political historians divide America into {party systems}—eras according to which parties were active; there have been 5 or 6 depending on who you ask.
    
    There were no parties during the first elections in 1788 partly because the framers feared parties (Madison called them {factions}) and there was universal agreement that {George Washington} should be first president.
    
    The first party system (from about 1796) included the {Federalists} (supporting Adams) and {Democratic-Republicans} (supporting Jefferson).
    
    The Federalists were supported by North-Eastern {business} elites who wanted closer ties with England and a stronger national government; Democratic-Republicans were more skeptical of national power and favored the {French}.
    
    The period 1815–1824 is sometimes called the "{Era of Good Feelings}" because the Federalists weren't really a factor; Monroe's elections were largely uncontested.
    
    The 1824 election (Adams vs. Jackson, decided in the House) and Jackson's "{corrupt bargain}" cry led to the second party system; Jackson's 1828 victory helped launch it.
    
    The {Whigs} started as an anti-Jackson party; the Democratic-Republicans re-branded as the "{Democrats}" and under {Martin Van Buren} introduced central party committees, state organizations, and state and national {conventions} for nominating candidates.
    
    Before conventions, candidates were chosen by {caucuses} of party leaders; the Whigs' 1840 campaign (Harrison) introduced political theater—log cabin, "Tippecanoe and Tyler too"—and the idea that presidential candidates should be {war heroes}.
    
    The issue of {slavery} destroyed the Whigs; {Lincoln}'s election in 1860 ushered in the third party system; the U.S. settled into a two-party system of Democrats vs. Republicans.
    
    The Republican party was originally reformers against slavery; their rallying cry was "{Free soil}, free labor, free men"; Southern states tilted {Democratic} because Republicans were seen as ending slavery.
    
    Third-party-system Democrats were a mix: white Southerners and working-class {immigrants} in the North; this was the era of political {machines} (trading appointments for support) in cities like Boston and New York.
    
    Reforms like {voter registration}, {secret} ballots, and requiring voters to be alive reduced the number of voters; the People's Party ({Populists}) formed in the South and West in the 1880s–90s with concerns about farm prices, railroad rates, income tax, and mistrust of bankers.
    
    # 42 Interest Groups
    
    An interest group is an organized group of individuals that make {policy-related} appeals to government; often the size of {membership} gives the group political clout.
    
    Interest groups do two main things: try to {shape policies} (by mobilizing voters or pressuring officials) and {gather information} to provide to elected officials—some say they write bills for officials to pass.
    
    Interest groups focus most on {Congress} (not the Supreme Court or the President); the President has advisers and only two terms so is less susceptible.
    
    {Bureaucracies} can also be targets because interest groups can supply information that is too costly or difficult for Congress or agencies to get.
    
    The combination of interest groups, Congress, and the bureaucracy is called an "{iron triangle}"; interest groups help Congress through contributions, support, and information.
    
    Interest groups often have {lawyers} who propose language for bills; this is more common at {state and local} levels where legislators lack staff.
    
    Bureaucratic agencies are often not as well-funded as interest groups; the {oil} industry (American Petroleum Institute) has more money for research than federal agencies.
    
    Interest groups can be more effective providing information to {agencies} and writing {regulations} rather than laws; regulations are just as important as laws for many industries.
    
    An interest group is not a {political party}—parties exist to get candidates elected, interest groups to influence policies; interest groups are also not the same as {PACs} (which collect and distribute campaign funds).
    
    The main argument for interest groups is {pluralism}—if all groups compete they balance each other out; Madison argued for extending the sphere and encouraging more {factions}.
    
    With more interest groups providing more information we get policies that are the result of thoughtful {compromise}; interest groups also offer more opportunity for {participation} (elections only every two years).
    
    Arguments against: wealthy groups have more {resources}; not all interests are equally represented; the system may favor those who can afford to organize and lobby.
    
    # 43 Interest Group Formation
    
    {Pluralist} theory proposes that every group with a particular interest should be able to form an organization to pursue policies that further that interest (e.g. Sierra Club, World Wildlife Foundation for wildlife habitats).
    
    Not everyone with an interest forms a group; political scientists cite {collective action} problems—when people should work together but don't; the classic example is building a {road} that many could use but no one individual could build.
    
    Big projects like the {Hoover Dam} or highway systems usually need government action; the government collects {taxes} from everybody to build the road because otherwise it wouldn't get built.
    
    {Free riding} is when people who stand to benefit don't pay (or don't pay enough) because the project will get done whether they contribute or not; they get the benefit (e.g. pothole-free road) without paying a dime.
    
    The free rider problem is worse in {larger} groups: more anonymous, easier to free ride; individuals may think their efforts don't matter (a smaller version of the {voter} paradox); it's harder to enforce rules against slackers.
    
    {Smaller} groups are more successful in forming and pushing their agenda; {producers} are more successful than consumers; {business} owners are usually more successful than workers; union membership and {dues} have been shrinking and unions are less able to get legislation passed.
    
    According to {Mancur Olson}, large groups solve collective action problems by providing {selective benefits} to members—perks that build membership.
    
    Selective benefits can be {material} (services, discounts, insurance, baseball caps), {informational} (policies that affect members, guidance), {solidary} (friendship, camaraderie, {networking}—why people join professional groups), or {purposive} (feeling you're making a difference).
    
    {AARP} provides material and informational benefits; purposive benefits explain why many joined groups during the {civil rights} movement (not for SNCC keychains).
    
    {Political entrepreneurs} make extraordinary efforts to bring people together to change policy; often politicians who recognize {latent} potential in unorganized groups; when successful they benefit {electorally}.
    
    {Claude Pepper} realized there were many older Americans in Florida and that if he became their champion and organized them they would vote for him; {Robert Wagner}'s sponsorship of the National Labor Relations Act ({Wagner} Act) helped create political power for labor unions and unions helped keep Wagner in Washington.
    
    {Lobbying} is an attempt to influence policy by persuading a government official; it can be providing information (as in iron triangles) or in popular view {campaign contributions} for favorable policy; there's no real evidence of quid pro quo (close to {bribery}) but the idea is powerful.
    
    Political scientists divide lobbying into {insider} and {outsider} strategies; insider strategies include directly persuading officials and using the {courts}.
    
    Congress has limited lobbying expense {deductions}, restricted travel expenses (cutting {political junkets}), and limited gifts to no more than {fifty} dollars.
    
    Using the courts: direct lawsuits (e.g. {Brown v. Board of Education}), finding and funding {plaintiffs}, and filing {amicus curiae} briefs; {environmental} and {civil rights} groups and {minority} groups often focus on courts since they're least successful in electoral politics.
    
    {Outsider} strategies involve mobilizing the public—sometimes called {grassroots} lobbying or "going public"; groups organize advertising campaigns, {protests}, and grassroots efforts to get membership to contact officials.
    
    The {Harry and Louise} campaign was sponsored by healthcare groups and doctors to stymie Clinton's healthcare reform; protests can form interest groups (e.g. {Occupy} after 2008); {labor strikes} can impose costs on business and push them to lobby.
    
    Grassroots lobbying is when a group encourages membership to {contact} elected officials (letters, emails, phone calls); technology makes this easier but also lets well-financed groups create {astroturf} lobbying—the appearance of grassroots when they really aren't.
    
    # 44 Media Institutions
    
    The main function of the media in politics is to provide {information} so people can make decisions and get involved; for economists the media lowers {information} costs—rather than researching ourselves, outlets tell us what they think we'll find useful.
    
    The oldest form we're discussing is {print}—newspapers and magazines; it's no longer the main source (large cities used to have morning and afternoon editions) but the {New York Times} and {Washington Post} still break most major stories and provide a lot of information for TV and Internet news.
    
    Print tends to offer more {detail} and comprehensive stories and is still the main source for {educated elites} whose opinions tend to matter a lot in making policy; check how often morning programs or aggregator sites reference the Times or Post.
    
    {Broadcast} media—television and radio—is the second oldest and in some ways still most important; {television} still reaches more Americans than any other form; {talk} radio (especially conservative) matters a lot in the political media landscape.
    
    A drawback of broadcast media is that TV stories are very {short} (usually less than two minutes) and therefore less informative.
    
    The {Internet} can update so quickly (good for breaking news) but may push organizations toward more stories and "{hot takes}" rather than deep reporting; early web news was mostly online versions of print; then came {blogs} and sites dedicated to politics, which polarized into right-wing and left-wing sites.
    
    {Social media} gave politicians, campaigns, and parties new ways to reach the masses; every candidate has Twitter, Facebook, and staff for social media; this can give lots of information but is hardly {unbiased} news—if it's your only source you're probably not getting the full story.
    
    A high percentage still relies on {television} news (local, national, cable combined); watching a nightly news program takes about {twenty-two} minutes without commercials and keeps you decently informed.
    
    Because broadcast and print are primarily financed by {advertising}, news organizations have an incentive not to report on stories critical of their parent organizations or advertisers; they're unlikely to report on themselves; it's pretty rare that news organizations {lie} outright.
    
    The New York Times and Washington Post tend to be more {liberal}; the Wall Street Journal, Fox News, and talk radio tend to be {conservative}; overall they may balance out.
    
    The most persistent bias in the news is toward {conflict} and {scandal}—not really liberal or conservative; the news media is most biased toward conflict, which may explain why you don't see many stories about {compromise}.
    
    Three main factors affect news coverage: {journalists} (they have discretion to report and interpret; the Times slogan was "all the news that's fit to print"; more journalists identify as liberal and Democrat than conservative or Republican).
    
    Second factor: the {politicians} themselves—they show up at events (opening day, natural disasters) for photo opportunities, cultivate relationships with reporters, and use {leaks} (disclosure of confidential information) to cement relationships and influence how a story is reported; reporters have a hard time refusing a {scoop}.
    
    Even more important than leaks are {press releases}—stories written by politicians or staff released to the press; politicians hope they're reported with minimal revisions (often true given pressure to put out content quickly); they lower the cost of producing information but are biased and can be misleading when reported as straight news.
    
    Third factor: {consumers}—producers want us to read and watch so they make news we'll want; news is tailored to groups most likely to consume it (better educated, wealthier); {working class}, union workers, religious groups, veterans, and minority groups are among those under-reported relative to their size.
    
    The media {mediates} information and shapes it; in many ways the most important thing about media is what it {doesn't} cover—it's hard for voters to formulate opinions or influence representatives if they don't know something is an issue.
    
    # 45 Media Regulation
    
    The framers wrote freedom of the press into the Bill of Rights because without a {free press} Americans would be less able to have the information needed for good political decisions; there are very few government regulations on what can appear in the newspaper because of the {First Amendment}.
    
    {Near v. Minnesota} said there could be no censorship in the form of {prior restraint}; New York Times v. US (Pentagon Papers) made it difficult for the government to use {national security} as an excuse to prevent publication of sensitive or embarrassing material.
    
    There are still {libel} laws allowing individuals to sue when papers print something they don't like; for public figures, {New York Times v. Sullivan} makes it pretty hard to censor the press by suing for libel.
    
    To win a libel suit against a public figure the plaintiff must show the statement was {untrue} and published with {actual malice} or reckless disregard for the truth—a very high bar.
    
    The government takes a larger role in TV and radio possibly because they reach the {largest} numbers; {broadcast} media is the most tightly regulated; regulation is through control of the {airwaves} via {licensing}—spectrum is a limited resource technically owned by the {public}.
    
    You need to purchase a license from the {federal} government to broadcast; licenses must be renewed every {five} years and almost always are; the {FCC} (Federal Communications Commission), founded in {1934} to oversee a chaotic radio industry, grants licenses and manages regulation.
    
    Stations had to show they were operating in the {public interest}; the {Fairness} Doctrine (1949) required broadcasters to give {equal time} to each side of a public issue (e.g. if you air a program criticizing a war you had to air one supporting it).
    
    In practice stations shied away from {controversial} programming; the Fairness Doctrine was never rigidly enforced; {Reagan}'s administration pushed for repeal in 1983; Congress voted to reinstate in 1987 but Reagan {vetoed} it; the Fairness Doctrine is pretty much dead.
    
    The {Equal Time} Rule requires broadcasters not to discriminate in selling time to political candidates; the {Right of Rebuttal} ensures a candidate can respond to a personal attack if it gets aired.
    
    The FCC regulates {obscenity}, {indecency}, and {profanity} on radio and TV; {FCC v. Pacifica} (George Carlin's Seven Words) established the FCC can require certain language and images not be broadcast during "{family times}"—before {10 PM}; the FCC also fines for f-bombs and wardrobe malfunctions.
    
    FCC rules only apply to {broadcast} media and not most basic cable channels (hence content like Game of Thrones).
    
    The 1996 {Telecommunications} Act tried to regulate broadcasters and the Internet; the Court struck down Title V, the {Communications Decency Act} (meant to regulate online pornography), because its definition of obscenity was {overbroad} and violated the First Amendment.
    
    The {Child Online Protection Act} (1998) was enjoined by lower federal courts in 2007; the Internet is largely {self-regulating} (Congress may recognize it changes so quickly that laws would be out of date); a more effective way to regulate has been {lawsuits} (e.g. {Napster}, intellectual property)—individuals and corporations use the courts to shape the Internet.
    
    Title III of the 1996 law dealt with {cable}—deregulation allowing companies that own newspapers, radio, and TV to also own cable; the 2003 FCC ruling allowed a single company to own the leading {newspaper}, television, and cable companies in a single market; critics worry about {monopolization} and lack of {diversity} in media.
    
    {Net neutrality} is the question of whether the FCC should pass rules letting internet service providers charge {differential} rates (e.g. faster service to Netflix at the expense of smaller competitors); the debate involves Congress, TV, the Internet, and the FCC's website where anyone can make {public comments} on proposed rules.
    
    Media regulation involves many actors: private media companies, media organizations, and executive agencies like the FCC; the overarching structure is built by {Congress} but the key actors are the {regulatory} rule makers and enforcers of the executive branch.
    
    With net neutrality and cross-ownership we're looking at regulation of {access} and how much media is available at a given price; some argue the Internet should be regulated like a {public utility} because the media serves a public function—without a robust media, Americans may have less access to information for political choices.
    
    # 46 Market Economy
    
    Many believe markets are natural (supply and demand like gravity), so government can't or shouldn't improve the economy; we posit that without some {government} a market economy wouldn't be possible.
    
    Government structures the economy in at least eight ways: establishing {law and order}; defining rules of {property}; governing rules of {exchange}; setting market standards; providing {public goods}; creating a labor force; ameliorating {externalities}; and promoting {competition}.
    
    {Law and order} helps structure the economy by providing {predictability}; it's harder to trade or produce for profit if bandits can take what you have; the government creates a legal system that can punish {fraud}, and knowing they can be punished prevents fraud.
    
    Without government what you think of as your property might not be as "yours" as you want; payment for a good confers a {title} to it—we see this especially with land ({real property} or real estate); if someone takes it you can bring the {courts}, legal system, or sheriff to get it back.
    
    {Trespass} laws are a concrete example of laws creating and protecting property rights (e.g. get off my lawn); ownership is a {bundle of rights}; without legally established ownership rules we can't buy or sell.
    
    Government sets and governs rules of exchange: {blue laws} (e.g. Indiana—no alcohol on certain days), {dry} counties, {Prohibition} (18th Amendment—manufacture, sale, transportation of intoxicating liquors); many drugs are {controlled substances}; you can't sell yourself into slavery, sell your body (prostitution), or sell organs (kidneys).
    
    Government sets {market standards}—{weights and measures}—so buyers and sellers operate on the same playing field; a pound of chickpeas, an acre (4,046.86 square meters or 43,560 square feet); a Scottish acre equals 1.27 U.S. acres; this was even more important when currency contained {precious metals}.
    
    {Public goods} can be enjoyed by everyone and once provided cannot be denied to a subset; examples: {public transportation} (bus, subway at subsidized cost), {air-traffic control} (private companies wouldn't provide it; different cities with different rules would be a disaster); unregulated markets wouldn't serve places with {small} populations.
    
    The {Tennessee Valley Authority} and rural electrification under the New Deal—it wouldn't have been profitable for power companies to provide electricity to rural towns and farms so the government did.
    
    Government creates a labor force: {compulsory education} laws (states require kids go to school so they're productive workers), {student loans}, government-run training programs, and employment (e.g. {WPA}, {CCC} during the Great Depression).
    
    An {externality} is an external effect that's a byproduct of a market transaction—the difference between private cost and {social} cost; example: leaded gasoline in the 1970s—air pollution was a public cost neither seller nor purchaser paid; the government {outlawed} lead in gasoline and limited air pollution; regulation and {taxes} are ways to deal with negative externalities.
    
    According to {Adam Smith}, the essence of a functioning market is {competition}; corporations and individuals have tried to stifle competition and create {monopolies}—one firm can charge whatever it wants; government has passed {antitrust} laws (used against Standard Oil, Microsoft); the government can also grant antitrust {exemptions} (e.g. Major League Baseball); under the {Commerce} Clause the government can promote or inhibit competition.
    
    # 47 Government Regulations
    
    Goals of economic policy: promoting {stable} markets; promoting economic {prosperity}; promoting {business} development; protecting {consumers} and {employees}.
    
    Promoting stable markets: maintaining law and order and minimizing {monopolies}; national regulations like {automobile fuel efficiency} standards—if states set different rules, car makers in Detroit might build for Michigan but not California, making it hard for manufacturers to know what to make.
    
    To promote prosperity the government tries to keep a positive {investment} climate; the {SEC} (Securities and Exchange Commission) regulates financial markets since people won't invest if they think the game's fixed.
    
    If it's feeling {Keynesian}, the government can spend on public investment—{highways}, the {internet} (began with a Defense Department program); it funds research through {NIH} and {National Science Foundation} and enhances the workforce through {education} and {immigration} policy; keeping {inflation} low (main tool: Federal Reserve).
    
    Promoting business development: {tariffs} and {subsidies}; since the Great Depression the U.S. has pursued {free trade} (lowering tariffs), which can hurt businesses short-run; in the past high tariffs allowed American businesses to develop free from foreign competition and helped make the U.S. the most powerful {industrial} nation.
    
    {Subsidies}: indirect—grants for transportation (superhighways), seen as public goods; {direct}—Small Business Administration, government investment in Sematech and {Solyndra}, {farm} subsidies (from Great Depression; critics say most go to corporate farms).
    
    Protecting employees: {National Labor Relations Act} and {Fair Labor Standards Act} (overtime) passed in the {1930s}; federal {minimum wage}; {OSHA} (Occupational Safety and Health Administration) sets regulations for hazardous fumes and life-threatening workplace conditions.
    
    Protecting consumers: {FDA} (medicines aren't poison); Department of Agriculture (meat inspection); {National Traffic and Motor Vehicle Safety Act} (1966); {Consumer Products Safety Commission} (lead paint in toys, exploding toasters).
    
    History: transcontinental railroad (1869) made a national market possible; railroads were {interstate} so Congress could regulate them; {Interstate Commerce Act} (1887) created the {ICC} (Interstate Commerce Commission) to regulate railroads (discriminatory pricing).
    
    {Gilded Age}: Congress passed first wave—ICC, {Federal Trade Commission}, {Sherman} and {Clayton} Acts (antitrust); 1920s return to {laissez faire} until Great Depression; {New Deal} brought the {administrative and regulatory state}; sometimes technology played a part (no {FAA} until there were airplanes).
    
    1970s under {Nixon}: new regulations focused on the economy as a whole—OSHA (all occupations), {EPA} (whole country's environment); since {Reagan} (and Carter) initiatives to {deregulate}, but the administrative regulatory state appears here to stay; bureaucracies have remarkable {staying power}.
    
    # 48 Monetary and Fiscal Policy
    
    {Monetary} policy is the way the government regulates the amount of {money} in circulation; controlling the money supply is the primary task of the {Federal Reserve} System; before 1913 there were state and local banks and a more limited Bank of the United States.
    
    The Fed was created in {1913}; it's made up of {12} regional banks and two boards: the {Federal Reserve Board of Governors} (appointed by the President) and the {Federal Open Market Committee} (partially appointed by the president).
    
    The Fed's two primary tasks: control {inflation} and encourage {full employment}; four basic functions but one is way more important—clearing {checks}, supplying currency, setting rules for banks, and most importantly {loaning} money to banks and setting {interest} rates (the main way it controls the money supply).
    
    The Fed sets the {discount} rate; the lower the rate the more banks borrow and the more money goes into circulation; other banks {peg} their rates to the Fed's, charging slightly more.
    
    The {reserve requirement} is the amount of cash a bank must have on hand; only a {fraction} of deposits (fractional reserve banking); it's there so you don't get catastrophic {bank runs} like in the Great Depression; raising it reduces money in circulation, lowering it pumps more in.
    
    The Fed also sets the rate banks charge to {lend to each other}; {Open Market Operations}—the Fed buys and sells government debt ({treasury bills}, bonds); when it sells bonds it takes money out, when it buys more goes in ({Quantitative Easing}).
    
    {Inflation} is a general rise in prices; one cause is the amount of money in circulation; usually low interest rates cause inflation and reduce unemployment, high rates cool an overheating economy (hasn't happened much recently); the Fed is {independent}—board and chair not elected, insulated from politics so they can look after broader interests than re-election.
    
    {Fiscal} policy is the government's ability to {raise taxes} and spend; Americans have been reluctant to raise taxes and somewhat reluctant to have government spend; the difference explains {deficits}; the government borrows by selling {bonds}.
    
    Since {Reagan}, {supply side} economics—lower taxes on businesses and individuals so they spend and invest more and the economy grows—has set the terms of debate; over 30 years: lower federal taxes, less {progressive} (wealthier pay lower percentage); income tax on highest earners, {estates}, {capital gains} and dividends have fallen (Obama raised rates primarily on those earning above $450,000); {corporate} tax rates declined; {Social Security} taxes have gone up (the federal tax most of us are most likely to pay).
    
    Federal revenue from taxes has held steady at about {43}% to 50%; 2013: about $2.8 trillion in revenue, $3.5 trillion spent—{deficit} around $700 billion.
    
    {Uncontrollables} or {mandatory} spending—items that must be spent because written into law: interest on federal debt, farm price supports, {Social Security} and {Medicare} (paid for with dedicated taxes); spending on them is unlikely to decline because the population is {aging}, people like them, and {older} people vote more so politicians won't vote for cuts.
    
    {Discretionary} spending is what people mean when they call for cuts; largest chunk: {defense} (over $600 billion in 2013), then {Medicaid} (healthcare for the poor, $498 billion); Education was $41 billion; the government could also balance the budget by {raising taxes} but political consequences can be tough (e.g. George H.W. Bush).
    
    Monetary policy becomes the major {lever} in broad-based macroeconomic policy because of Americans' aversion to raising taxes and limited ability to cut spending.
    
    # 49 Social Policy
    
    Social policy deals with things like {Social Security}, {education}, and {healthcare}; it's hard to separate from economic policy because they're all paid for with money; one way to distinguish is to look at a policy's {goals}.
    
    Social programs seek to: protect against {risk} and insecurity (job loss, health, disability); promote {equal opportunity}; and assist the {poor}; there's general agreement that promoting equal opportunity is good, less agreement on protecting from risk, and widespread {skepticism} about helping the poor.
    
    Americans traditionally haven't cared much for social policy due to strong faith in {individualism}—suspicious of government action, favoring {private charity} and pull-yourself-up-by-your-bootstraps self-reliance.
    
    Prior to the 1930s the federal government's role in protecting people from risk was {minimal}; there were state-level attempts to protect workers but courts often struck them down; the government provided pensions to {veterans' widows} but numbers were never very large except briefly after the Civil War.
    
    The {Great Depression} changed how Americans viewed government and poverty; suffering was so great that many felt it was the government's job to do something; {private charities} couldn't handle the needy; not all poor could be considered to have failed personally; people could be victims of economic forces beyond their control; the question changed from "if" the government should help to "{how}."
    
    {Social Security} (1935) was a reaction to many elderly being poor (no work, little savings, no pensions); it provided monthly payments to people over {65}, enough to prevent abject poverty; it's not a savings program—taxes are deducted from wages and {matched} by employers; total {7.65}% (6.2% Social Security, 1.45% Medicare); money goes into a pot paid out to people over 65—today's workers pay today's older Americans.
    
    Benefits are {indexed} (go up with inflation); the program redistributes from younger to older and from richer to poorer (there's a {cap} on salary subject to payroll tax); conservatives like it because it's funded by a {regressive} payroll tax; liberals like it for automatic benefits for the elderly.
